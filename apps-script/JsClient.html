  // Phát hiện môi trường: chạy trong Google Apps Script (HtmlService) hay bản preview tĩnh.
 var IS_GAS = (typeof google !== 'undefined' && google.script && google.script.run);
 // URL JSON API của backend Google Apps Script (ghi vào Google Sheets).
 var GAS_EXEC_URL = 'https://script.google.com/macros/s/AKfycbybZBCki3-Bjve2IiAPo7YGuV6f0c5WNJivAfhdDT83Q_lFPX9d-d0yZH77nF-pK1kj/exec';
 // Chọn backend:
 //  - Được GAS phục vụ (IS_GAS) -> dùng google.script.run (nhanh, trong iframe).
 //  - Chạy trên web thật (vd GitHub Pages) -> gọi GAS qua fetch (ghi Sheet thật).
 //  - Chạy LOCAL (localhost/file) -> MockServer (demo, dữ liệu localStorage) để dev/demo offline.
 //    (Thêm ?backend=gas vào URL local để ép dùng backend thật khi cần test.)
 var IS_LOCAL = (location.protocol === 'file:' || /^(localhost|127\.|0\.0\.0\.0|\[?::1)/.test(location.hostname));
 var FORCE_GAS = /[?&]backend=gas/.test(location.search);
 var GAS_API_URL = (!IS_GAS && (FORCE_GAS || !IS_LOCAL)) ? GAS_EXEC_URL : '';
 function gasRun(fn) {
   var args = Array.prototype.slice.call(arguments, 1);
   return new Promise(function (resolve, reject) {
     // QUAN TRỌNG: gọi method TRÊN chính runner (this = runner) để giữ success/failure handler.
     // Dùng .apply(null, ...) sẽ mất handler → promise treo mãi → kẹt màn hình "Đang tải".
     var runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
     runner[fn].apply(runner, args);
   });
 }
 // Gọi backend GAS qua fetch (cross-origin). Content-Type text/plain = request "đơn giản" (không preflight CORS).
 function apiCall(fn, args) {
   return fetch(GAS_API_URL, {
     method: 'POST', redirect: 'follow',
     headers: { 'Content-Type': 'text/plain;charset=utf-8' },
     body: JSON.stringify({ fn: fn, args: args || [] })
   }).then(function (r) { return r.json(); }).then(function (j) {
     if (j && j.ok) return j.result;
     throw new Error((j && j.error) || 'Lỗi kết nối máy chủ.');
   });
 }

   // Trên GAS: gọi proxy server-side (API key nằm trong Script Properties, không lộ ra client).
   if (IS_GAS) return gasRun('aiGenerate', state.token, prompt);
   if (GAS_API_URL) return apiCall('aiGenerate', [state.token, prompt]); // qua backend thật
   if (!apiKey) throw new Error('Tính năng AI chưa được cấu hình (thiếu API key).');
   const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=' + apiKey;
   const payload = { contents: [{ parts: [{ text: prompt }] }] };
   let retries = 3; let delay = 800;
   while (retries > 0) {
     try {
       const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
       if (!response.ok) throw new Error('HTTP error! status: ' + response.status);
       const data = await response.json();
       var text = data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text;

     } catch (e) {

 var CAL_DOW = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];

 // Bảng chi tiết "việc trong ngày" hiện bên dưới lịch khi chọn 1 ngày.
 function calDayDetail(tasksArr, showName) {

   var dts = (tasksArr || []).filter(function (t) { return calDateOf(t) === sel; });
   if (!dts.length) return '';

 }
 // Dựng lưới lịch (grid + khay chưa hạn) cho MỘT tập task bất kỳ, theo state.period hiện tại.
 function calDateOf(t){ return (t && t.status === STATUS.DONE) ? (ymd(t.completedAt) || ymd(t.deadline)) : ymd(t.deadline); }
  function buildCalGrid(tasksArr, opts) {
   var showName = !!(opts && opts.showName);
   var p = state.period;
   var dayMap = {}, monthCount = {}, withDl = 0;
   tasksArr.forEach(function (t) {
     var dl = calDateOf(t);
     if (!dl) return;
     withDl++;
     (dayMap[dl] = dayMap[dl] || []).push(t);
     var mk = dl.substring(0, 7); monthCount[mk] = (monthCount[mk] || 0) + 1;
   });
   var today = todayStr();
   var grid = '';

   if (p.type === 'day') {
     var dd0 = parseYmd(p.anchor), dkey0 = fmtYmd(dd0), isT0 = (dkey0 === today), dts0 = dayMap[dkey0] || [];
     grid = '<div class="cal-grid cal-grid--day"><div class="cal-week-col' + (isT0 ? ' cal-cell--today' : '') + (dkey0 === state.calSelectedDay ? ' cal-week-col--sel' : '') + '" data-action="cal-pick-day" data-ymd="' + dkey0 + '" data-drop-ymd="' + dkey0 + '" style="cursor:pointer">' +
       '<div class="cal-col-head">' + CAL_DOW[(dd0.getDay() + 6) % 7] + ' · ' + pad2(dd0.getDate()) + '/' + pad2(dd0.getMonth() + 1) + '/' + dd0.getFullYear() + (isT0 ? ' <span class="cal-today-dot">hôm nay</span>' : '') + '</div>' +
       (dts0.length ? dts0.map(function (t) { return calChip(t, showName); }).join('') : '<div class="cal-empty">— Không có việc đến hạn trong ngày —</div>') +
       '</div></div>';

   } else if (p.type === 'week') {
     var mon = mondayOf(parseYmd(p.anchor));
     var cols = '';
     for (var i = 0; i < 7; i++) {
       var d = new Date(mon); d.setDate(mon.getDate() + i);
       var key = fmtYmd(d), isToday = (key === today), dts = dayMap[key] || [];
       cols += '<div class="cal-week-col' + (isToday ? ' cal-cell--today' : '') + (key === state.calSelectedDay ? ' cal-week-col--sel' : '') + '" data-action="cal-pick-day" data-ymd="' + key + '" data-drop-ymd="' + key + '" style="cursor:pointer">' +
         '<div class="cal-col-head">' + CAL_DOW[i] + ' · ' + pad2(d.getDate()) + '/' + pad2(d.getMonth() + 1) + (isToday ? ' <span class="cal-today-dot">hôm nay</span>' : '') + '</div>' +
         (dts.length ? dts.map(function (t) { return calChip(t, showName); }).join('') : '<div class="cal-empty">—</div>') + '</div>';
     }
     grid = '<div class="cal-grid cal-grid--week">' + cols + '</div>';

   } else if (p.type === 'year') {
     var yr = parseYmd(p.anchor).getFullYear();
     var cards = '';
     for (var mo = 0; mo < 12; mo++) {
       var ym = yr + '-' + pad2(mo + 1), cnt = monthCount[ym] || 0;
       cards += '<div class="cal-month-card' + (cnt ? ' has-tasks' : '') + '" data-action="cal-month" data-ym="' + ym + '" data-drop-ym="' + ym + '">' +
         '<div class="mc-name">Tháng ' + (mo + 1) + '</div><div class="mc-count">' + cnt + '</div><div class="mc-sub">công việc</div></div>';
     }
     grid = '<div class="cal-year">' + cards + '</div>';

   } else { // month
     var anchorD = parseYmd(p.anchor), year = anchorD.getFullYear(), month = anchorD.getMonth();
     var first = new Date(year, month, 1);
     var firstOffset = (first.getDay() + 6) % 7;
     var daysInMonth = new Date(year, month + 1, 0).getDate();
     var weeks = Math.ceil((firstOffset + daysInMonth) / 7);
     var gridStart = mondayOf(first);
     var head = CAL_DOW.map(function (s) { return '<div class="cal-dow">' + s + '</div>'; }).join('');
     var cells = '';
     for (var k = 0; k < weeks * 7; k++) {
       var dd = new Date(gridStart); dd.setDate(gridStart.getDate() + k);
       var ckey = fmtYmd(dd), out = (dd.getMonth() !== month), isT = (ckey === today), cts = dayMap[ckey] || [];
       var chips = cts.slice(0, 3).map(function (t) { return calChip(t, showName); }).join('') +
         (cts.length > 3 ? '<div class="cal-more" data-action="cal-pick-day" data-ymd="' + ckey + '">+' + (cts.length - 3) + ' nữa…</div>' : '');
       cells += '<div class="cal-cell' + (out ? ' cal-cell--out' : '') + (isT ? ' cal-cell--today' : '') + (ckey === state.calSelectedDay ? ' cal-cell--sel' : '') + '" data-action="cal-pick-day" data-ymd="' + ckey + '" data-drop-ymd="' + ckey + '">' +
         '<div class="cal-daynum">' + dd.getDate() + '</div>' + chips + '</div>';
     }
     grid = '<div class="cal-grid cal-grid--month">' + head + cells + '</div>';
   }

   // Khay việc CHƯA CÓ HẠN (không lên lịch được) — chỉ ở Tuần/Tháng.
   var tray = '';
   if (p.type !== 'year') {
     var noDl = tasksArr.filter(function (t) { return !ymd(t.deadline); });
     if (noDl.length) {
       tray = '<div class="card" style="margin-top:14px;padding:14px 16px;background:rgba(255,255,255,0.4)">' +
         '<div class="text-sm muted" style="margin-bottom:8px">🕓 Chưa đặt hạn (' + noDl.length + ') — <b>kéo-thả vào lịch</b> để đặt ngày (hoặc bấm để chọn ngày)</div>' +
         '<div class="row row--wrap" style="gap:6px">' +
         noDl.map(function (t) { return '<span class="cal-chip cal-chip--tray ' + (STATUS_CLASS[t.status] || '') + '" draggable="true" data-drag-code="' + esc(t.taskCode) + '" data-action="quick-schedule" data-code="' + esc(t.taskCode) + '" title="Kéo-thả vào lịch hoặc bấm để đặt ngày" style="display:inline-block;max-width:220px">' + ic('pin') + ' ' + esc(t.title) + (showName ? ' · ' + esc(assigneeNames(t)) : '') + '</span>'; }).join('') +
         '</div></div>';
     }
   }
   return { html: grid + tray + calDayDetail(tasksArr, showName), withDl: withDl };
 }

 function projAssignGroups(tasks) {
   if (!tasks.length) return '<div class="empty text-sm">Chưa có task nào.</div>';
   var byPri = function(a,b){ return (PRIORITY_RANK[a.priority]||2)-(PRIORITY_RANK[b.priority]||2) || (a.deadline||'').localeCompare(b.deadline||''); };
   var groups = {}, gorder = [];
   tasks.forEach(function(t){ var ks = isUnclaimed(t) ? ['__unclaimed'] : assigneesOf(t); ks.forEach(function(k){ if (!groups[k]) { groups[k] = []; gorder.push(k); } groups[k].push(t); }); });
   gorder.sort(function(a,b){ var na = a==='__unclaimed'?'zzz':String(memberName(a)); var nb = b==='__unclaimed'?'zzz':String(memberName(b)); return na.localeCompare(nb, 'vi'); });
   return gorder.map(function(k){
     var arr = groups[k].slice().sort(byPri);
     var dn = arr.filter(function(t){ return t.status===STATUS.DONE; }).length;
     var who = (k==='__unclaimed') ? '' + ic('pin') + ' Chưa đăng ký' : '' + ic('user') + ' ' + esc(memberName(k));
     var rows = arr.map(function(t){
       return '<tr data-action="open-task-detail" data-code="'+esc(t.taskCode)+'" style="cursor:pointer">' +

         '<td><span class="pri '+(PRIORITY_CLASS[t.priority]||'')+'" style="font-size:11px">'+esc(t.priority)+'</span></td>' +
         '<td class="text-xs">'+esc(t.difficulty)+'</td>' +
         '<td class="text-xs">'+(t.deadline?esc(fmtDateVN(t.deadline)):'—')+'</td>' +
         '<td><span class="pill '+(STATUS_CLASS[t.status]||'')+'" style="font-size:11px"><span class="dot"></span>'+esc(t.status)+'</span></td></tr>';
     }).join('');
     return '<div style="margin-top:14px"><div class="row row--between" style="margin-bottom:6px"><b>'+who+'</b><span class="faint text-xs">'+dn+'/'+arr.length+' xong</span></div>' +
       '<div class="table-wrap"><table><thead><tr><th>Mã</th><th>Công việc</th><th>Ưu tiên</th><th>Độ khó</th><th>Hạn</th><th>Trạng thái</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
   }).join('');
 }
 function renderProjectDetail(id, silo) {

   }

   html += '<div class="card stack" style="margin-bottom:24px; background:rgba(175,82,222,0.05); border:1px solid rgba(175,82,222,0.2)">' +
     '<div class="row row--between row--wrap"><div class="stack" style="gap:4px">' +
     '<h2 style="color:var(--c-project)">' + esc(p.name) + '</h2>' +
     '<div class="text-sm">Ngày sự kiện / Shooting: <b>' + (p.eventDate ? fmtDateVN(p.eventDate) : '—') + '</b></div>' +
     '</div>' + headerBtns + '</div>' +
     
     '<div class="proj-progress" style="height:16px; border-radius:10px"><div class="fill" style="width:'+pct+'%; border-radius:10px; background:'+(p.status===PROJ_STATUS.COMPLETED?'#34c759':'linear-gradient(90deg, #af52de, #5ac8fa)')+'"></div></div>' +

     (runningCodes.length ? '<div style="margin-top:12px; font-size:14px">' + ic('bolt') + ' <b>Đang trực tiếp xử lý:</b> ' + runningCodes.map(function(c){return '<span class="tag" style="background:rgba(23, 71, 157,0.15); color:var(--c-secondary-active)">'+esc(memberName(c))+'</span>';}).join(' ') + '</div>' : '') +
     '</div>';

   // Xếp dọc TOÀN CHIỀU RỘNG (bảng rộng hơn, tên việc xuống tối đa 2 dòng) thay vì 2 cột chật.
   html += '<div class="stack">';

   if (!pTasks.length) taskHtml += '<div class="empty text-sm">Chưa có task nào trong dự án này.</div>';
   else {
     // Tự động GOM theo Người thực hiện; mỗi nhóm là 1 bảng đầy đủ cột.
     var byPri = function(a,b){ return (PRIORITY_RANK[a.priority]||2)-(PRIORITY_RANK[b.priority]||2) || (a.deadline||'').localeCompare(b.deadline||''); };
     var groups = {}, gorder = [];
     pTasks.forEach(function(t){ var ks = isUnclaimed(t) ? ['__unclaimed'] : assigneesOf(t); ks.forEach(function(k){ if (!groups[k]) { groups[k] = []; gorder.push(k); } groups[k].push(t); }); });
     gorder.sort(function(a,b){ var na = a==='__unclaimed'?'zzz':String(memberName(a)); var nb = b==='__unclaimed'?'zzz':String(memberName(b)); return na.localeCompare(nb, 'vi'); });
     taskHtml += '<div class="text-xs faint" style="margin:4px 0 2px">Tự động gom theo <b>Người thực hiện</b>:</div>';
     taskHtml += gorder.map(function(k){
       var arr = groups[k].slice().sort(byPri);
       var dn = arr.filter(function(t){ return t.status===STATUS.DONE; }).length;
       var who = (k==='__unclaimed') ? '' + ic('pin') + ' Chưa đăng ký' : '' + ic('user') + ' ' + esc(memberName(k));
       var rows = arr.map(function(t){
         return '<tr data-action="open-task-detail" data-code="'+esc(t.taskCode)+'" style="cursor:pointer">' +

           '<td style="min-width:240px"><b class="clamp2">'+esc(t.title)+'</b>'+(t.phatSinh?' <span class="tag" style="font-size:10px;padding:1px 6px;background:rgba(255,149,0,0.15);color:#c05600;border-color:rgba(255,149,0,0.35)">' + ic('bolt') + ' PS</span>':'')+'</td>' +
           '<td><span class="pri '+(PRIORITY_CLASS[t.priority]||'')+'" style="font-size:11px">'+esc(t.priority)+'</span></td>' +
           '<td class="text-xs">'+esc(t.difficulty)+'</td>' +
           '<td class="text-xs">'+(t.deadline?esc(fmtDateVN(t.deadline)):'—')+'</td>' +
           '<td><span class="pill '+(STATUS_CLASS[t.status]||'')+'" style="font-size:11px"><span class="dot"></span>'+esc(t.status)+'</span></td></tr>';
       }).join('');
       return '<div style="margin-top:14px"><div class="row row--between" style="margin-bottom:6px"><b>'+who+'</b><span class="faint text-xs">'+dn+'/'+arr.length+' xong</span></div>' +
         '<div class="table-wrap"><table><thead><tr><th>Mã</th><th>Công việc</th><th>Ưu tiên</th><th>Độ khó</th><th>Hạn</th><th>Trạng thái</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
     }).join('');
   }
   taskHtml += '</div>';
   html += taskHtml;

   // Thống kê & KPI Độc lập của Project
   var membersKpiHtml = '';
   if (totalT === 0) {
     membersKpiHtml = '<tr><td colspan="4" class="center muted text-sm">Chưa có số liệu.</td></tr>';
   } else {
     var memberStats = {};
     // CHỈ thống kê những thành viên viewer được phép thấy (ẩn người cấp cao / khác silo).
     (isCrewProj ? [] : (p.memberCodes || [])).forEach(function(c){ if (canSeeMember(c)) memberStats[c] = { assigned:0, done:0 }; });
     pTasks.forEach(function(t) {
       assigneesOf(t).forEach(function(c) {           // task nhiều người -> tính cho TỪNG người thực hiện
         if(!canSeeMember(c)) return;
         if(!memberStats[c]) memberStats[c] = {assigned:0, done:0};
         memberStats[c].assigned++;
         if(t.status === STATUS.DONE) memberStats[c].done++;
       });
     });
     
     membersKpiHtml = Object.keys(memberStats).map(function(c) {

       '</div>';
   }
   html += '</div>';
   setView(html);
 }

 function taskActions(t) {
   var u = state.user;
   var btns = [];
   // Việc CHƯA ĐĂNG KÝ: người đủ điều kiện có thể NHẬN (đăng ký) việc.
   if (isUnclaimed(t)) {
     var canClaim = t.crewTask ? (isCrewRole(u.role) || canManageCrew(u)) : hasDeptBoard(u.role);
     if (canClaim) btns.push('<button class="btn btn--primary btn--sm" data-action="task-claim" data-code="' + esc(t.taskCode) + '">' + ic('hand') + ' Nhận việc</button>');
     if (canForceStatus(t)) {} // quản lý vẫn sửa/xoá qua kebab
     return btns.join('');
   }
   // Chính chủ (bất kỳ AI trong nhóm người thực hiện): luồng chuẩn (bắt đầu / tạm hoãn / gửi draft / xác nhận hoàn thành / ghi chú).
   if (isAssignee(t, u.code)) {
     if (t.status === STATUS.TODO) btns.push('<button class="btn btn--secondary btn--sm" data-action="task-start" data-code="' + esc(t.taskCode) + '">Bắt đầu</button>');
     else if (t.status === STATUS.RUNNING) {
       btns.push('<button class="btn btn--ghost btn--sm" data-action="task-pause" data-code="' + esc(t.taskCode) + '">Tạm hoãn</button>');
       btns.push('<button class="btn btn--primary btn--sm" data-action="task-submit" data-code="' + esc(t.taskCode) + '">Gửi draft</button>');
     } else if (t.status === STATUS.PENDING) btns.push('<button class="btn btn--secondary btn--sm" data-action="task-resume" data-code="' + esc(t.taskCode) + '">Tiếp tục</button>');
     else if (t.status === STATUS.SENT) btns.push('<button class="btn btn--success btn--sm" data-action="task-complete" data-code="' + esc(t.taskCode) + '">Xác nhận hoàn thành</button>');
     btns.push('<button class="btn btn--ghost btn--sm" data-action="task-note" data-code="' + esc(t.taskCode) + '">' + ic('note') + ' Ghi chú</button>');
     btns.push('<button class="btn btn--ghost btn--sm" data-action="task-support" data-code="' + esc(t.taskCode) + '"' + (t.needSupport ? ' style="color:#dc2626;border-color:rgba(220,38,38,0.45)"' : '') + '>' + (t.needSupport ? '✓ Đang cần hỗ trợ' : '⚠️ Cần hỗ trợ') + '</button>');
   }
   // Quản lý (Leader/Sub-lead/Trưởng/Phó phòng) xem việc của NGƯỜI KHÁC: ÉP đổi trạng thái.
   else if (canForceStatus(t)) {
     btns.push('<button class="btn btn--ghost btn--sm" data-action="force-status" data-code="' + esc(t.taskCode) + '">⚙️ Đổi trạng thái</button>');
   }
   return btns.join('');
 }

 // Thẻ 1 dự án (dùng ở mục Dự án).
 function projectCard(p, silo) {
   silo = silo || 'dept';
   var isCrewCard = silo === 'crew';

   var pTasks = state.tasks.filter(function(t){return t.projectId === p.id && (isCrewCard ? t.crewTask : !t.crewTask);});
   var doneTasks = pTasks.filter(function(t){return t.status === STATUS.DONE;});
   var pct = pTasks.length > 0 ? Math.round((doneTasks.length / pTasks.length) * 100) : 0;
   var editBtn = (!isCrewCard && canManageProject(p)) ? kebabMenu({ menuAction: 'project-menu', entries: [
       { action: 'edit-project', id: p.id, code: '', label: '' + ic('edit') + ' Sửa dự án' },
       { action: 'delete-project', id: p.id, code: '', label: '' + ic('trash') + ' Xoá dự án', danger: true }
     ] }) : '';
   return '<div class="card stack" style="cursor:pointer;border-top: 4px solid '+ (p.status===PROJ_STATUS.COMPLETED?'var(--c-success)':(isCrewCard?'#ff2d55':'var(--c-project)')) +'" data-action="view-project" data-id="'+esc(p.id)+'" data-silo="'+silo+'">' +
     '<div class="row row--between"><span class="tag tag--project mono text-xs">' + esc(p.id) + '</span>' +
     '<div class="row" style="gap:4px">' + (p.status === PROJ_STATUS.COMPLETED ? '<span class="pill pill--done"><span class="dot"></span>Hoàn thành</span>' : '<span class="pill" style="background:rgba(175,82,222,0.1);color:#af52de"><span class="dot"></span>Đang chạy</span>') + editBtn + '</div></div>' +
     '<h3 style="font-size:20px; margin:4px 0">' + esc(p.name) + '</h3>' +
     '<div class="text-sm muted">Lead: <b>' + esc(memberName(p.leadCode)) + '</b></div>' +
     '<div class="text-sm muted">Sự kiện/Shooting: <b>' + (p.eventDate ? fmtDateVN(p.eventDate) : '—') + '</b></div>' +
     '<div class="proj-progress"><div class="fill" style="width:'+pct+'%; background:'+(p.status===PROJ_STATUS.COMPLETED?'#34c759':'linear-gradient(90deg, #af52de, #5ac8fa)')+'"></div></div>' +

 }

 // MỤC GỘP "Công việc": 2 tab con (Công việc daily | Dự án) + bộ lọc kỳ riêng mỗi tab. silo: 'dept' | 'crew'.
 function renderWork(silo) {
   silo = silo || 'dept';
   var isCrew = silo === 'crew';
   var u = state.user, mgr = isCrew ? canManageCrew(u) : isManager(u);
   var canSelf = isCrew ? isCrewRole(u.role) : (deptScopeOf(u.role) === 'own');
   var tab = isCrew ? (state.crewWorkTab || 'daily') : (state.workTab || 'daily');
   var whichDaily = isCrew ? 'crewdaily' : 'daily';
   var whichProj = isCrew ? 'crewprojects' : 'projects';
   var tabAction = isCrew ? 'crew-work-tab' : 'work-tab';
   if (isCrew) setTitle('🎬 Production Crew — Công việc', 'Công việc daily & Dự án của Production Crew');
   else setTitle('Công việc', 'Công việc daily & Dự án — Trung Tâm Truyền Thông');
   var view = state.workView || 'grid';
   var viewSeg = (tab !== 'projects') ? '<div class="seg"><button data-action="work-view" data-view="grid"' + (view === 'grid' ? ' class="is-active"' : '') + '>▦ Lưới</button><button data-action="work-view" data-view="list"' + (view === 'list' ? ' class="is-active"' : '') + '>☰ Chi tiết</button></div>' : '';
   var seg = '<div class="row row--wrap" style="gap:14px;align-items:center;margin-bottom:18px"><div class="seg">' +
     '<button data-action="' + tabAction + '" data-tab="daily"' + (tab === 'daily' ? ' class="is-active"' : '') + '>' + ic('clipboard') + ' Công việc daily</button>' +
     '<button data-action="' + tabAction + '" data-tab="projects"' + (tab === 'projects' ? ' class="is-active"' : '') + '>' + ic('rocket') + ' Dự án</button></div>' + viewSeg + '</div>';
   var wireDaily = false, html;
   if (tab === 'projects') {
     html = seg + periodControlFor(whichProj) + workProjectsBody(isCrew, mgr, whichProj);
   } else {
     html = seg + periodControlFor(whichDaily) + workDailyBody(isCrew, mgr, canSelf, whichDaily);
     wireDaily = true;
   }
   setView(html);
   if (wireDaily) {
     var f = state.filters;
     var apply = function () { f.q = (el('f-q')||{}).value||''; f.status = (el('f-status')||{}).value||''; f.assignee = mgr ? ((el('f-assignee')||{}).value||'') : ''; renderPage(); };
     ['f-status', 'f-assignee'].forEach(function (id) { var n = el(id); if (n) n.addEventListener('change', apply); });
     var sBtn = el('f-search-btn'); if (sBtn) sBtn.addEventListener('click', apply);
     var cBtn = el('f-clear-btn'); if (cBtn) cBtn.addEventListener('click', function () { f.q = ''; renderPage(); });
   }
 }
 function workDailyBody(isCrew, mgr, canSelf, which) {
   var f = state.filters;
   var list = state.tasks.filter(function (t) {
     if (isCrew ? !t.crewTask : t.crewTask) return false;
     if (t.projectId) return false; // daily = không thuộc dự án
     if (!inWorkPeriod(t.createdAt, which)) return false;
     if (f.status && t.status !== f.status) return false;
     if (mgr && f.assignee && !isAssignee(t, f.assignee)) return false;
     if (f.q && !(t.title||'').toLowerCase().includes(f.q.toLowerCase()) && !(t.taskCode||'').toLowerCase().includes(f.q.toLowerCase())) return false;
     return true;
   }).sort(function (a, b) { return workStatusRank(a)-workStatusRank(b) || (isUnclaimed(b)?1:0)-(isUnclaimed(a)?1:0) || (PRIORITY_RANK[a.priority]||2)-(PRIORITY_RANK[b.priority]||2) || (b.createdAt||'').localeCompare(a.createdAt||''); });
   var createBtn = (mgr || canSelf) ? '<button class="btn btn--primary" data-action="' + (isCrew ? 'open-create-crew' : 'open-create') + '">+ ' + (mgr ? (isCrew ? 'Giao việc crew' : 'Giao việc daily') : 'Thêm việc của tôi') + '</button>' : '';
   var toolbar = '<div class="card" style="padding:16px 24px;margin-bottom:24px"><div class="row row--wrap" style="gap:12px">' +
     '<div class="row" style="gap:6px"><input id="f-q" placeholder="Tìm tên/mã..." value="' + esc(f.q) + '" style="max-width:200px"><button class="btn btn--secondary btn--sm" id="f-search-btn">Tìm</button>' + (f.q?'<button class="icon-btn" id="f-clear-btn">✕</button>':'') + '</div>' +
     '<select id="f-status" style="max-width:150px"><option value="">Mọi trạng thái</option>' + STATUS_FILTER_ORDER.map(function(s){return '<option value="'+esc(s)+'" '+(f.status===s?'selected':'')+'>'+esc(s)+'</option>';}).join('') + '</select>' +
     (mgr ? '<select id="f-assignee" style="max-width:150px"><option value="">Mọi người</option>' + state.members.filter(function(m){return m.active && (isCrew?isCrewRole(m.role):hasDeptBoard(m.role));}).map(function(m){return '<option value="'+esc(m.code)+'" '+(f.assignee===m.code?'selected':'')+'>'+esc(m.name)+'</option>';}).join('') + '</select>' : '') +
     '<div class="spacer"></div>' + createBtn + '</div></div>';
   var view = state.workView || 'grid';
   var cards;
   if (!list.length) cards = '<div class="card empty"><div class="big">🗂️</div><p>Không có công việc daily trong kỳ này.</p></div>';
   else if (view === 'list') cards = '<div class="task-rows">' + list.map(taskRow).join('') + '</div>';
   else cards = '<div class="task-list task-list--grid">' + list.map(taskCard).join('') + '</div>';
   return toolbar + cards;
 }
 // Hàng gọn cho chế độ "Chi tiết / Danh sách".
 function taskRow(t) {
   return '<div class="task-row' + (isUnclaimed(t) ? ' task-row--unclaimed' : '') + '" data-action="open-task-detail" data-code="' + esc(t.taskCode) + '">' +
     '<span class="tr-code mono">' + esc(t.taskCode) + '</span>' +
     '<span class="tr-title">' + esc(t.title) + (t.batchName ? ' <span class="faint text-xs">' + ic('puzzle') + ' ' + esc(t.batchName) + '</span>' : '') + '</span>' +
     '<span class="tr-meta">' + ic('user') + ' ' + esc(assigneeNames(t)) + (t.deadline ? ' · ' + ic('clock') + ' ' + esc(fmtDateVN(t.deadline)) : '') + '</span>' +
     '<span class="pill ' + (STATUS_CLASS[t.status]||'') + '"><span class="dot"></span>' + esc(t.status) + '</span>' +

 function workProjectsBody(isCrew, mgr, which) {
   if (isCrew) {
     // Dự án của Crew = layout GIỐNG Trung Tâm (thẻ dự án -> chi tiết), CHỈ hiện task crew.
     var cprojs = state.projects.filter(function (p) { return inWorkPeriod(p.createdAt, which); });
     var chead = '<div class="row row--between" style="margin-bottom:18px"><div class="faint text-sm">Có ' + cprojs.length + ' dự án trong kỳ (bấm để xem task crew của dự án)</div>' +

     if (!cprojs.length) return chead + '<div class="card empty"><div class="big">🚀</div><p>Chưa có dự án nào trong kỳ. Dự án dùng chung với Trung Tâm.</p></div>';
     return chead + '<div class="grid-cards">' + cprojs.map(function (p) { return projectCard(p, 'crew'); }).join('') + '</div>';
   }
   var projs = state.projects.filter(function (p) { return inWorkPeriod(p.createdAt, which); });
   var html = '<div class="row row--between" style="margin-bottom:18px"><div class="faint text-sm">Có ' + projs.length + ' dự án trong kỳ</div>' +
     (hasDeptBoard(state.user.role) ? '<button class="btn btn--primary" data-action="open-create-project">+ Tạo Dự án mới</button>' : '') + '</div>';
   if (!projs.length) return html + '<div class="card empty"><div class="big">🚀</div><p>Chưa có dự án nào trong kỳ này.</p></div>';
   return html + '<div class="grid-cards">' + projs.map(function (p) { return projectCard(p, 'dept'); }).join('') + '</div>';
 }

 // ================== PRODUCTION CREW ==================
 function drawCrewChart(crewTasks, crewMembers) {
   if (chartInstances.crewDept) { chartInstances.crewDept.destroy(); chartInstances.crewDept = null; }
   if (chartInstances.crewMember) { chartInstances.crewMember.destroy(); chartInstances.crewMember = null; }
   Chart.defaults.font.family = "'Inter', -apple-system, sans-serif"; Chart.defaults.color = "#86868b";
   var s = computeStats(crewTasks, state.period.type, state.period.anchor);
   var ctx = el('crewTaskChart');
   if (ctx) {
     var done = s.completedInP, rem = Math.max(0, s.totalInP - done);
     chartInstances.crewDept = new Chart(ctx, { type: 'doughnut',
       data: { labels: ['Hoàn thành', 'Chưa xong'], datasets: [{ data: [done, rem], backgroundColor: ['#ff2d55', 'rgba(0,0,0,0.05)'], borderWidth: 0 }] },
       options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { usePointStyle: true } } } } });
   }
   var ctxM = el('crewMemberChart');
   if (ctxM) {
     var colors = ['rgba(255,45,85,0.85)','rgba(23, 71, 157,0.85)','rgba(52,199,89,0.85)','rgba(255,159,10,0.85)','rgba(175,82,222,0.85)','rgba(90,200,250,0.85)'];
     var rows = crewMembers.map(function (m) { return { m: m, s: computeStats(crewTasks.filter(function(t){return isAssignee(t,m.code);}), state.period.type, state.period.anchor) }; }).sort(function(a,b){return b.s.donePts-a.s.donePts;});
     var labels = [], data = [];
     rows.forEach(function (r) { if (r.s.donePts > 0) { labels.push(r.m.name); data.push(r.s.donePts); } });
     if (data.length) chartInstances.crewMember = new Chart(ctxM, { type: 'pie',
       data: { labels: labels, datasets: [{ data: data, backgroundColor: data.map(function(_,i){return colors[i%colors.length];}), borderWidth: 2, borderColor: '#fff' }] },
       options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { usePointStyle: true } } } } });
     else ctxM.parentElement.innerHTML = '<div class="empty faint" style="padding-top:40px">Chưa có KPI crew.</div>';
   }
 }

 function renderCrew() {
   var u = state.user, crewMgr = canManageCrew(u);
   var tab = state.crewTab || 'dashboard';
   if (tab === 'work') return (state.crewWorkTab === 'projects' && state.selectedProjectId) ? renderProjectDetail(state.selectedProjectId, 'crew') : renderWork('crew');
   if (tab === 'dashboard') {
     if (crewMgr) { setTitle('🎬 Production Crew — Bảng điều khiển', 'Thống kê theo từng thành viên crew · daily + dự án'); return renderTeamDashboard('crew'); }
     // Dashboard CÁ NHÂN cho thành viên crew.
     setTitle('🎬 Production Crew — Bảng điều khiển', 'Công việc crew của bạn');
     var mine = state.tasks.filter(function (t) { return t.crewTask && isAssignee(t, u.code); });
     var s = computeStats(mine, state.period.type, state.period.anchor);
     var pctStr = s.totalInP > 0 ? Math.round(s.taskCompletionRate) + '%' : '—';
     var dailyCnt = mine.filter(function (t) { return !t.projectId; }).length, projCnt = mine.filter(function (t) { return t.projectId; }).length;
     var cards =
       '<div class="card kpi"><div class="kpi-top"><div class="kpi-icon ico-red"><span class="glyph">' + icon3d("🎬", 32) + '</span></div></div><div class="kpi-val">' + s.completedInP + '<span class="faint" style="font-size:1.1rem">/' + s.totalInP + '</span></div><div class="kpi-sub">Task HT / Giao (kỳ)</div></div>' +
       '<div class="card kpi"><div class="kpi-top"><div class="kpi-icon ico-green"><span class="glyph">' + icon3d("⏱️", 32) + '</span></div></div><div class="kpi-val">' + fmtH(s.avgCycleH) + '</div><div class="kpi-sub">T/g làm TB</div></div>' +
       '<div class="card kpi"><div class="kpi-top"><div class="kpi-icon ico-blue"><span class="glyph">' + icon3d("📂", 32) + '</span></div></div><div class="kpi-val">' + dailyCnt + ' · ' + projCnt + '</div><div class="kpi-sub">Daily · dự án</div></div>' +
       '<div class="card kpi"><div class="kpi-top"><div class="kpi-icon ico-purple"><span class="glyph">' + icon3d("⏸️", 32) + '</span></div></div><div class="kpi-val">' + fmtH(s.avgPauseH) + '</div><div class="kpi-sub">T/g tạm hoãn TB</div></div>';
     var inner = s.totalInP === 0 ? '<div class="empty"><div class="big">🎬</div><p>Chưa có task crew trong kỳ này.</p></div>' : '<div class="chart-container"><canvas id="deptTaskChart"></canvas></div>';
     setView('<div class="row row--wrap" style="margin-bottom:24px">' + periodControl() + '</div>' +
       '<div class="grid-cards" style="margin-bottom:24px">' + cards + '</div>' +
       '<div class="grid-dashboard"><div class="stack"><div class="card stack"><h3>Tỉ lệ hoàn thành (' + pctStr + ')</h3>' + inner + '</div></div><div class="stack">' + renderRecentTasks(mine) + '</div></div>');
     requestAnimationFrame(function () { drawCharts(s); });
     return;
   }
   // tab === 'members' — GIAO DIỆN GIỐNG PHÒNG: lưới thẻ + tìm kiếm + thêm/đổi vai trò + bấm xem hồ sơ.
   var selCrew = state.selectedMember ? (state.members.filter(function (x) { return x.code === state.selectedMember; })[0] || null) : null;
   if (selCrew && isCrewRole(selCrew.role)) return renderMemberDetail(state.selectedMember);
   setTitle('🎬 Production Crew — Nhân sự', 'Đội ngũ Production · tìm theo tên/mã · bấm vào một người để xem hồ sơ.');
   var crewMembers = state.members.filter(function (m) { return isCrewRole(m.role); }).sort(function (a, b) { return String(a.name).localeCompare(String(b.name), 'vi'); });
   var toolbar = '<div class="card" style="padding:14px 18px;margin-bottom:18px"><div class="row row--wrap" style="gap:12px;align-items:center">' +
     '<input id="mem-search" placeholder="🔎 Tìm theo tên hoặc mã nhân sự..." value="' + esc(state.memberSearch || '') + '" style="max-width:340px;flex:1">' +
     '<div class="faint text-sm">' + crewMembers.length + ' thành viên crew</div><div class="spacer"></div>' +
     (crewMgr ? '<button class="btn btn--primary" data-action="add-crew-member">+ Thêm nhân sự</button><button class="btn btn--secondary" data-action="open-crew-role">⚙️ Đổi vai trò</button>' : '') +
     '</div></div>';
   var grid = crewMembers.length
     ? '<div data-mem-group><div class="grid-cards">' + crewMembers.map(memberCard_).join('') + '</div></div>'
     : '<div class="card empty"><div class="big">🎬</div><p>Chưa có thành viên crew.' + (crewMgr ? ' Bấm "+ Thêm nhân sự" để thêm.' : '') + '</p></div>';
   setView(toolbar + grid + '<div id="mem-none" class="empty text-sm" style="display:none">Không tìm thấy nhân sự khớp từ khoá.</div>');
   var siC = el('mem-search');
   if (siC) { siC.addEventListener('input', applyMemberSearch_); if (state.memberSearch) applyMemberSearch_(); }
 }

 function renderKpiTargets() {
   setTitle('Phân bổ KPI chung', 'KPI dựa trên các task daily (Không tính Project)');
   var type = state.period.type, anchor = state.period.anchor;
   var rows = state.members.filter(function(m){return m.active;}).map(function(m) {
     var ts = state.tasks.filter(function(t){return isAssignee(t, m.code) && !t.projectId && !t.crewTask;});
     return { m: m, s: computeStats(ts, type, anchor) };
   }).sort(function(a,b){return b.s.donePts - a.s.donePts;});

   var rowsHtml = rows.map(function (r) {
     var target = parseFloat(state.kpiTargets[r.m.code]) || 0, actual = r.s.donePts;
     var pct = target > 0 ? (actual / target * 100) : 0, pctClass = pct > 100 ? 'kpi-over' : (pct >= 100 ? 'kpi-100' : 'kpi-low');
     return '<tr><td class="mono">' + esc(r.m.code) + '</td><td><b>' + esc(r.m.name) + '</b></td>' +
       '<td><input class="kpi-target-input" type="number" min="0" step="0.5" value="' + esc(target) + '" id="kpi-inp-' + esc(r.m.code) + '"></td>' +
       '<td class="right"><b>' + (Math.round(actual*10)/10) + '</b></td><td class="right kpi-pct ' + pctClass + '">' + (target>0?Math.round(pct)+'%':'—') + (pct>100?' 🏆':'') + '</td>' +
       '<td style="min-width:120px"><div class="kpi-bar"><div class="kpi-bar-fill" style="width:'+Math.min(pct,100)+'%;background:'+(pct>100?'#af52de':(pct>=80?'#34c759':(pct>=50?'#ff9f0a':'#ff3b30')))+'"></div></div></td></tr>';
   }).join('');

   setView('<div class="row row--wrap" style="margin-bottom:24px">' + periodControl() + '</div>' +

   var saveBtn = el('save-kpi-btn');
   if (saveBtn) saveBtn.addEventListener('click', function () {
     var targets = {}; rows.forEach(function (r) { var i = el('kpi-inp-' + r.m.code); if (i) targets[r.m.code] = i.value; });

 function renderMemberDetail(code) {
   var m = state.members.filter(function (x) { return x.code === code; })[0];
   if (!m) { state.selectedMember = null; return renderMembers(); }
   setTitle('Hồ sơ nhân sự', m.code + ' · ' + (ROLE_LABEL[m.role] || m.role));

   var crew = mine.filter(function (t) { return t.crewTask && !t.projectId; });
   var prog = function (arr) { var d = arr.filter(function (t) { return t.status === STATUS.DONE; }).length; return { d: d, pct: arr.length ? Math.round(d / arr.length * 100) : 0 }; };
   var pAll = prog(mine);
   var canEditThis = isManager(state.user) && m.role !== ROLE.HEAD;

     '<span class="role-badge ' + (ROLE_CLASS[m.role] || '') + '" style="align-self:flex-start">' + esc(ROLE_LABEL[m.role] || m.role) + '</span>' +
     (m.active ? '' : ' <span class="tag tag--none">Vô hiệu hóa</span>') + '</div>' +
     '<div class="spacer"></div>' +
     (canEditThis ? '<button class="btn btn--ghost btn--sm" data-action="edit-member" data-code="' + esc(m.code) + '">' + ic('edit') + ' Sửa hồ sơ</button>' : '') +

     var fail = function(e){ b.disabled=false; b.textContent='Tạo và Giao việc'; handleErr(e); };
     function mk(extra){ var p = {}; for (var k in base) p[k]=base[k]; for (var j in extra) p[j]=extra[j]; return p; }
     if (titles.length) {
       // BATCH: 1 "đầu việc chung" -> N việc con ĐỘC LẬP (mã/trạng thái riêng), cùng nhãn batchName.
       if (!batchName) batchName = el('t-title').value.trim() || 'Nhóm việc';
       var run = titles.reduce(function(pr, title){ return pr.then(function(){ return Server.createTask(state.token, mk({ title: title, batchName: batchName })); }); }, Promise.resolve());
       run.then(refreshState).then(function(){ closeModal(); toast('🧩 Đã tạo ' + titles.length + ' việc con thuộc "' + batchName + '".', 'ok'); renderPage(); }).catch(fail);
     } else {
       Server.createTask(state.token, mk({ title: el('t-title').value, batchName: batchName }))
         .then(function(t) { return refreshState().then(function(){ return t; }); })
         .then(function(t){
           closeModal();
           toast(t.title + ' - ' + t.taskCode + (isUnclaimed(t) ? ' - đã tạo (Chưa đăng ký)' : ' - đã được giao'), 'ok');
           renderPage();
         })
         .catch(fail);
     }
   });
 }

 function openEditTask(code) {
   var t = state.tasks.filter(function (x) { return x.taskCode === code; })[0];
   if (!t) return;
   // Danh sách người thực hiện theo loại task (Phòng ↔ Crew tách biệt)
   var pool = t.crewTask ? state.members.filter(function (m) { return m.active && isCrewRole(m.role); })
                         : state.members.filter(function (m) { return m.active && hasDeptBoard(m.role); });
   if (!t.crewTask && t.projectId) { var prj = state.projects.find(function (p) { return p.id === t.projectId; }); if (prj && prj.memberCodes) pool = pool.filter(function (m) { return prj.memberCodes.includes(m.code) || m.code === prj.leadCode; }); }
   // Chính chủ (không phải quản lý) chỉ sửa việc của mình -> khoá người thực hiện = chính mình.
   if (!canManageTask(t)) pool = state.members.filter(function (m) { return m.code === state.user.code; });

 // Đổi ảnh đại diện của CHÍNH MÌNH. Ảnh được nén về tối đa 256px (JPEG ~0.82) ở client để base64 nhỏ.
 var _avatarPending = null; // dataURL đang chờ lưu
 function openAvatarModal() {
   var u = state.user; _avatarPending = null;
   var html = '<div class="modal-head"><h2>🖼️ Thay đổi hình ảnh đại diện</h2><button class="icon-btn" data-action="close-modal">✕</button></div>' +
     '<form id="avatar-form"><div class="modal-body">' +
     '<div class="row" style="gap:18px;align-items:center;flex-wrap:wrap">' +
     '<div id="avatar-preview-wrap">' + avatarHtml(u, 96, null) + '</div>' +
     '<div style="flex:1;min-width:180px">' +
     '<div class="text-sm muted" style="margin-bottom:8px">Chọn ảnh từ thiết bị (JPG/PNG). Ảnh sẽ được thu nhỏ tự động.</div>' +
     '<input id="avatar-file" type="file" accept="image/png,image/jpeg,image/webp">' +
     '</div></div>' +
     '<div id="avatar-msg" class="text-sm" style="margin-top:12px;color:var(--c-danger)"></div>' +
     '</div><div class="modal-foot">' +
     (u.avatar ? '<button type="button" class="btn btn--ghost" id="avatar-remove" style="color:var(--c-danger)">Xoá ảnh hiện tại</button>' : '') +
     '<div class="spacer"></div><button type="button" class="btn btn--ghost" data-action="close-modal">Hủy</button>' +
     '<button type="submit" class="btn btn--primary" id="avatar-go" disabled>Lưu ảnh</button></div></form>';
   openModal(html);

   var fileEl = el('avatar-file'), goEl = el('avatar-go'), msgEl = el('avatar-msg'), prevWrap = el('avatar-preview-wrap');
   fileEl.addEventListener('change', function () {
     msgEl.textContent = '';
     var f = this.files && this.files[0]; if (!f) return;
     if (!/^image\//.test(f.type)) { msgEl.textContent = 'Vui lòng chọn tệp ảnh.'; return; }
     if (f.size > 8 * 1024 * 1024) { msgEl.textContent = 'Ảnh gốc quá lớn (tối đa 8MB).'; return; }
     var reader = new FileReader();
     reader.onload = function (ev) {
       var img = new Image();
       img.onload = function () {
         var max = 256, w = img.width, h = img.height;
         if (w > h) { if (w > max) { h = Math.round(h * max / w); w = max; } }
         else { if (h > max) { w = Math.round(w * max / h); h = max; } }
         var cv = document.createElement('canvas'); cv.width = w; cv.height = h;
         cv.getContext('2d').drawImage(img, 0, 0, w, h);
         var data = cv.toDataURL('image/jpeg', 0.82);
         if (data.length > 200000) data = cv.toDataURL('image/jpeg', 0.6);
         if (data.length > 200000) { msgEl.textContent = 'Ảnh quá lớn sau khi nén. Hãy chọn ảnh khác.'; return; }
         _avatarPending = data;
         prevWrap.innerHTML = avatarHtml({ name: u.name, role: u.role, avatar: data }, 96, null);
         goEl.disabled = false;
       };
       img.onerror = function () { msgEl.textContent = 'Không đọc được ảnh.'; };
       img.src = ev.target.result;
     };
     reader.onerror = function () { msgEl.textContent = 'Không đọc được tệp.'; };
     reader.readAsDataURL(f);
   });

   var rm = el('avatar-remove');
   if (rm) rm.addEventListener('click', function () {
     this.disabled = true; this.innerHTML = '<span class="spin"></span>';
     Server.saveAvatar(state.token, '').then(function (r) { state.user.avatar = ''; return refreshState(); })
       .then(function () { closeModal(); toast('Đã xoá ảnh đại diện.', 'ok'); renderShell(); })
       .catch(function (e) { rm.disabled = false; rm.textContent = 'Xoá ảnh hiện tại'; handleErr(e); });
   });

   $('#avatar-form').addEventListener('submit', function (ev) {
     ev.preventDefault();
     if (!_avatarPending) return;
     var b = el('avatar-go'); b.disabled = true; b.innerHTML = '<span class="spin"></span>';
     Server.saveAvatar(state.token, _avatarPending).then(function (r) { state.user.avatar = r && r.avatar != null ? r.avatar : _avatarPending; return refreshState(); })
       .then(function () { closeModal(); toast('Đã cập nhật ảnh đại diện.', 'ok'); renderShell(); })
       .catch(function (e) { b.disabled = false; b.textContent = 'Lưu ảnh'; handleErr(e); });
   });
 }

   try {
     var projName = function (id) { if (!id) return ''; var p = (state.projects||[]).filter(function(x){return x.id===id;})[0]; return p ? p.name : id; };
     var taskRows = (state.tasks||[]).map(function (t) {
       return {

         'Người nhận': assigneeNames(t), 'Người giao': creatorName(t),
         'Loại': t.crewTask ? 'Production Crew' : (t.projectId ? 'Dự án' : 'Daily'),
         'Dự án': projName(t.projectId), 'Phần phụ': t.category || '', 'Độ khó': t.difficulty,
         'Ưu tiên': t.priority, 'Trạng thái': t.status,
         'Hạn chót': ymd(t.deadline), 'Ngày tạo': ymd(t.createdAt), 'Hoàn thành lúc': ymd(t.completedAt),
         'Ghi chú': t.note || ''
       };
     });
     var memRows = (state.members||[]).map(function (m) {
       return { 'Mã NV': m.code, 'Họ tên': m.name, 'Vai trò': ROLE_LABEL[m.role] || m.role, 'Chức danh': m.title || '', 'Đang hoạt động': m.active ? 'Có' : 'Không' };
     });
     var wb = XLSX.utils.book_new();
     XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(taskRows.length ? taskRows : [{ 'Mã việc': '(trống)' }]), 'Công việc');
     XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(memRows.length ? memRows : [{ 'Mã NV': '(trống)' }]), 'Nhân sự');
     var fname = 'BaoCao_CongViec_' + todayStr() + '.xlsx';
     XLSX.writeFile(wb, fname);
     toast('Đã xuất ' + fname, 'ok');
   } catch (e) { toast('Lỗi xuất Excel: ' + (e.message || e), 'err'); }
 }

 // Document-level HTML5 drag-and-drop cho lịch (đăng ký 1 lần).
 (function wireCalendarDnD() {
   var dragCode = null;
   document.addEventListener('dragstart', function (e) {
     var n = e.target.closest ? e.target.closest('[data-drag-code]') : null;
     if (!n) return;
     dragCode = n.getAttribute('data-drag-code');
     try { e.dataTransfer.setData('text/plain', dragCode); e.dataTransfer.effectAllowed = 'move'; } catch (er) {}
     n.classList.add('cal-dragging');
   });
   document.addEventListener('dragend', function (e) {
     var n = e.target.closest ? e.target.closest('[data-drag-code]') : null; if (n) n.classList.remove('cal-dragging');
     Array.prototype.forEach.call(document.querySelectorAll('.cal-drop-hover'), function (x) { x.classList.remove('cal-drop-hover'); });
   });
   document.addEventListener('dragover', function (e) {
     var z = e.target.closest ? e.target.closest('[data-drop-ymd],[data-drop-ym]') : null;
     if (z && dragCode) { e.preventDefault(); try { e.dataTransfer.dropEffect = 'move'; } catch (er) {} z.classList.add('cal-drop-hover'); }
   });
   document.addEventListener('dragleave', function (e) {
     var z = e.target.closest ? e.target.closest('[data-drop-ymd],[data-drop-ym]') : null; if (z) z.classList.remove('cal-drop-hover');
   });
   document.addEventListener('drop', function (e) {
     var z = e.target.closest ? e.target.closest('[data-drop-ymd],[data-drop-ym]') : null;
     if (!z) return;
     e.preventDefault(); z.classList.remove('cal-drop-hover');
     var code = dragCode; try { code = e.dataTransfer.getData('text/plain') || dragCode; } catch (er) {}
     dragCode = null;
     if (!code) return;
     var ymdStr = z.getAttribute('data-drop-ymd') || (z.getAttribute('data-drop-ym') ? (z.getAttribute('data-drop-ym') + '-01') : '');
     if (ymdStr) doSetDeadline(code, ymdStr);
   });
 })();

 function chatState() { if (!state.chat) state.chat = { chats: [], roster: [], online: {}, me: state.user ? state.user.code : '', activeId: null, msgs: [], lastId: 0, mobileThread: false, stickerCat: 'joy', stickerOpen: false, poll: null, tick: 0, loaded: false }; return state.chat; }

 function stopChatPoll() { var c = state.chat; if (c && c.poll) { clearInterval(c.poll); c.poll = null; } }
 function startChatPoll() {
   stopChatPoll(); var c = chatState();
   c.poll = setInterval(function () {
     if (state.page !== 'chat' || !state.token) { stopChatPoll(); return; }
     c.tick = (c.tick || 0) + 1;
     // ~mỗi 24s làm mới danh sách + trạng thái online (đốm xanh/xám) mà không phá thread.
     if (c.tick % 4 === 0) chatLoad(function () { var a = chatActiveChat(); if (a) markChatRead(a); notifyNewMessages(); updateMsgBadge(); renderChatList(); if (a) refreshThreadHeaderDot(a); });

       if (added.length) { c.msgs = c.msgs.concat(added); c.lastId = c.msgs[c.msgs.length - 1].id; renderChatMsgs(true); chatLoad(function () { var a = chatActiveChat(); if (a) markChatRead(a); renderChatList(); updateMsgBadge(); }); }
     }).catch(function () {});
   }, 2000); // poll NHANH (2s) khi đang mở hội thoại -> nhận tin gần như tức thì
