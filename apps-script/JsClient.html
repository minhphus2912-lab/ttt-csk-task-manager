 function isoWeek(dObj) {

 function mockDB() {

   if (!raw) { var s = mockSeed(); localStorage.setItem(MOCK_KEY, JSON.stringify(s)); return s; }
   try { return JSON.parse(raw); } catch (e) { var s2 = mockSeed(); localStorage.setItem(MOCK_KEY, JSON.stringify(s2)); return s2; }
 }
 function mockSave(db) { localStorage.setItem(MOCK_KEY, JSON.stringify(db)); }
 function mockReset() { localStorage.removeItem(MOCK_KEY); }
 function pubMem(m) { return { code: m.code, name: m.name, role: m.role, title: m.title, active: m.active, grants: m.grants || [], avatar: m.avatar || '' }; }
 function diffList(cfg) { return DIFF_ORDER.map(function (d) { return { label: d, points: cfg[d] }; }); }

 var MockServer = {
   bootstrap: function () {
     var db = mockDB();
     // KHÔNG trả roster ở màn đăng nhập (đăng nhập bằng cách NHẬP mã + PIN).
     return Promise.resolve({ departmentName: db.departmentName, difficulties: diffList(db.config), statuses: STATUS_ORDER, members: [] });
   },
   login: function (code, pin) {
     var db = mockDB(); var cu = String(code).trim().toUpperCase();
     var m = db.members.filter(function (x) { return x.code.toUpperCase() === cu && x.active; })[0];
     if (!m) return Promise.reject(new Error('Tài khoản không tồn tại hoặc bị khóa.'));
     if (m.pin !== String(pin)) return Promise.reject(new Error('Mã cá nhân (PIN) không đúng.'));
     var tk = 'mock-' + m.code + '-' + Date.now();
     db.sessions[tk] = m.code;
     db.activeToken = db.activeToken || {}; db.activeToken[m.code] = tk; // 1 tài khoản = 1 phiên: đăng nhập mới đá phiên cũ
     mockSave(db);
     return Promise.resolve({ token: tk, user: pubMem(m) });
   },
   _user: function (db, tk) {
     var code = db.sessions[tk]; if (!code) return null;
     return db.members.filter(function (m) { return m.code === code && m.active; })[0] || null;
   },
   getState: function (tk) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u) return Promise.reject(new Error('SESSION_EXPIRED'));
     if (db.activeToken && db.activeToken[u.code] && db.activeToken[u.code] !== tk) return Promise.reject(new Error('SESSION_KICKED'));
     var urank = rankOf(u.role), dScope = deptScopeOf(u.role), crewAll = canManageCrew(u), crewOwn = !crewAll && isCrewRole(u.role);
     var roleByCode = {}; db.members.forEach(function (m) { roleByCode[m.code] = m.role; });
     var aRank = function (t) { var r = roleByCode[t.assigneeCode]; return (r === undefined) ? 9 : rankOf(r); };
     var aIsCrew = function (t) { return isCrewRole(roleByCode[t.assigneeCode]); };
     var deptTasks = [];
     if (dScope==='all') deptTasks = db.tasks.filter(function(t){return !t.crewTask;});
     else if (dScope==='allButHigher') deptTasks = db.tasks.filter(function(t){return !t.crewTask && aRank(t)>=urank;});
     else if (dScope==='own') deptTasks = db.tasks.filter(function(t){return !t.crewTask && (t.assigneeCode===u.code || !t.assigneeCode);});
     var crewT = [];
     if (crewAll) crewT = db.tasks.filter(function(t){return t.crewTask && (aIsCrew(t) || !t.assigneeCode);});
     else if (crewOwn) crewT = db.tasks.filter(function(t){return t.crewTask && (t.assigneeCode===u.code || !t.assigneeCode);});
     var tasks = deptTasks.concat(crewT);
     var projects;
     if (dScope==='all' || dScope==='allButHigher') projects = db.projects || [];
     else if (dScope==='own') projects = (db.projects||[]).filter(function(p){return p.leadCode===u.code || (p.memberCodes||[]).includes(u.code);});
     else if (canViewCrew(u)) projects = db.projects || []; // crew thấy dự án để liên kết task
     else projects = [];
     var allow = {}; allow[u.code]=true;
     if (dScope==='all') db.members.forEach(function(m){ if(!isCrewRole(m.role)) allow[m.code]=true; });
     else if (dScope==='allButHigher') db.members.forEach(function(m){ if(!isCrewRole(m.role) && rankOf(m.role)>=urank) allow[m.code]=true; });
     else if (dScope==='own') { var ref={}; projects.forEach(function(p){ ref[p.leadCode]=1; (p.memberCodes||[]).forEach(function(c){ref[c]=1;}); }); deptTasks.forEach(function(t){ if(t.assigneeCode) ref[t.assigneeCode]=1; }); db.members.forEach(function(m){ if(ref[m.code] && !isCrewRole(m.role) && rankOf(m.role)>=urank) allow[m.code]=true; }); }
     if (crewAll) db.members.forEach(function(m){ if(isCrewRole(m.role)) allow[m.code]=true; });
     var members = db.members.filter(function(m){ return allow[m.code]; }).map(pubMem);
     var kpi = {}; Object.keys(db.kpiTargets || {}).forEach(function (c) { if (allow[c]) kpi[c] = db.kpiTargets[c]; });
     return Promise.resolve({
       user: pubMem(u), tasks: JSON.parse(JSON.stringify(tasks)), projects: JSON.parse(JSON.stringify(projects||[])),
       members: members,
       config: { departmentName: db.departmentName, difficulties: diffList(db.config), statuses: STATUS_ORDER }, kpiTargets: kpi
     });
   },
   createTask: function (tk, p) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u) return Promise.reject(new Error('SESSION_EXPIRED'));
     var crewTask = !!p.crewTask;
     var rawAssignee = String(p.assigneeCode || '').trim();
     var unassigned = !rawAssignee; // việc "Chưa đăng ký" — chỉ quản lý tạo
     var selfCreate = false;
     if (crewTask) {
       if (!canManageCrew(u)) {
         if (!isCrewRole(u.role)) return Promise.reject(new Error('Bạn không có quyền quản lý Production Crew.'));
         selfCreate = true;
         if (unassigned || rawAssignee !== u.code) return Promise.reject(new Error('Bạn chỉ được tự giao việc cho chính mình.'));
       }
     } else if (!isManager(u)) {
       if (deptScopeOf(u.role) !== 'own') return Promise.reject(new Error('Không có quyền tạo việc.'));
       selfCreate = true;
       if (unassigned || rawAssignee !== u.code) return Promise.reject(new Error('Chuyên viên chỉ được tự giao việc cho chính mình.'));
     }
     var asg = null;
     if (!unassigned) {
       asg = db.members.filter(function(m){return m.code===rawAssignee && m.active;})[0];
       if (!asg) return Promise.reject(new Error('Người được giao việc không hợp lệ.'));
       if (crewTask && !isCrewRole(asg.role)) return Promise.reject(new Error('Chỉ giao task crew cho thành viên Production Crew.'));
       if (!crewTask && !hasDeptBoard(asg.role)) return Promise.reject(new Error('Việc của Phòng chỉ giao cho nhân sự có mặt ở Phòng.'));
       if (!(crewTask && isCrewAdmin(u)) && outranksWithinSilo(u.role, asg.role)) return Promise.reject(new Error('Không thể giao việc cho người có vai trò cao hơn.'));
     }
     if (p.projectId) {
       var prj = (db.projects||[]).filter(function(x){return x.id===p.projectId;})[0];
       if (!prj) return Promise.reject(new Error('Dự án không tồn tại.'));
       if (selfCreate && prj.leadCode !== u.code && (prj.memberCodes||[]).indexOf(u.code) < 0) return Promise.reject(new Error('Bạn không thuộc dự án này.'));
       if (p.deadline && prj.eventDate && p.deadline > prj.eventDate) return Promise.reject(new Error('Hạn công việc không được trễ hơn ngày sự kiện của dự án (' + prj.eventDate + ').'));
     }
     var prefix = p.projectId ? p.projectId.replace('PRJ-','') : (crewTask ? 'CREW' : todayStr().replace(/-/g,''));
     var suffix = unassigned ? 'CHUA' : rawAssignee;
     var code = prefix + '-' + ('00' + (Math.floor(Math.random()*900)+100)).slice(-3) + '-' + suffix;
     var category = String(p.category || '').trim(); if (category && WORK_CATEGORIES.indexOf(category) < 0) category = '';
     var task = {
       taskCode: code, title: p.title, description: p.description, assigneeCode: unassigned ? '' : rawAssignee,
       difficulty: p.difficulty, kpiPoint: db.config[p.difficulty], status: unassigned ? STATUS.UNCLAIMED : STATUS.TODO, createdBy: u.code,
       createdAt: getLocalIso(), deadline: p.deadline, startedAt: '', submittedAt: '', completedAt: '', reportLink: '', note: p.note || '',
       priority: p.priority || 'Bình thường', pauseHours: 0, projectId: p.projectId || null, crewTask: crewTask,
       category: category, completeLink: '', phatSinh: (!!p.phatSinh) && !!p.projectId, batchName: String(p.batchName||'').trim()
     };
     db.tasks.push(task); mockSave(db); return Promise.resolve(task);
   },
   transitionTask: function (tk, code, action, link) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u) return Promise.reject(new Error('SESSION_EXPIRED'));
     var t = db.tasks.filter(function (x) { return x.taskCode === code; })[0];
     if (!t) return Promise.reject(new Error('Không tìm thấy công việc.'));
     var now = getLocalIso();
     if (action === 'claim') {
       if (t.status !== STATUS.UNCLAIMED || t.assigneeCode) return Promise.reject(new Error('Công việc này đã có người nhận.'));
       var canClaim = t.crewTask ? (isCrewRole(u.role) || canManageCrew(u)) : hasDeptBoard(u.role);
       if (!canClaim) return Promise.reject(new Error('Bạn không thể nhận công việc này.'));
       t.assigneeCode = u.code; t.status = STATUS.TODO; mockSave(db); return Promise.resolve(t);
     }
     if (action === 'force') {
       var canForce = t.crewTask ? canManageCrew(u) : isManager(u);
       if (!canForce) return Promise.reject(new Error('Chỉ quản lý mới được ép đổi trạng thái.'));
       if (!t.assigneeCode) return Promise.reject(new Error('Việc chưa có người nhận.'));
       var ns = String(link || '').trim();
       if (STATUS_ORDER.indexOf(ns) < 0) return Promise.reject(new Error('Trạng thái không hợp lệ.'));
       t.status = ns;
       if (ns === STATUS.RUNNING && !t.startedAt) t.startedAt = now;
       if (ns === STATUS.SENT && !t.submittedAt) t.submittedAt = now;
       if (ns === STATUS.DONE && !t.completedAt) t.completedAt = now;
       mockSave(db); return Promise.resolve(t);
     }
     if (t.assigneeCode !== u.code) return Promise.reject(new Error('Chỉ người được giao việc mới có quyền thao tác trên công việc này.'));
     if (action === 'start') { t.status = STATUS.RUNNING; t.startedAt = now; }
     else if (action === 'pause') { t.status = STATUS.PENDING; t._lastPausedAt = now; }
     else if (action === 'resume') { t.status = STATUS.RUNNING; if (t._lastPausedAt) { t.pauseHours = (t.pauseHours || 0) + (instant(now) - instant(t._lastPausedAt))/3600000; delete t._lastPausedAt; } }
     else if (action === 'submit') { t.status = STATUS.SENT; t.submittedAt = now; t.reportLink = link || ''; }
     else if (action === 'complete') { t.status = STATUS.DONE; t.completedAt = now; if (link) t.completeLink = link; }
     mockSave(db); return Promise.resolve(t);
   },
   updateTaskNote: function (tk, code, note) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u) return Promise.reject(new Error('SESSION_EXPIRED'));
     var t = db.tasks.filter(function (x) { return x.taskCode === code; })[0];
     if (t && t.assigneeCode === u.code) { t.note = note; mockSave(db); return Promise.resolve({ok:true}); }
     return Promise.reject(new Error('Chỉ người được giao việc mới có quyền sửa ghi chú.'));
   },
   updateTask: function (tk, code, p) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u) return Promise.reject(new Error('SESSION_EXPIRED'));
     var t = db.tasks.filter(function (x) { return x.taskCode === code; })[0];
     if (!t) return Promise.reject(new Error('Không tìm thấy công việc.'));
     var isMgrOfTask = t.crewTask ? canManageCrew(u) : isManager(u);
     var ownEdit = (t.assigneeCode === u.code) && !t.projectId && (deptScopeOf(u.role) === 'own' || isCrewRole(u.role));
     if (!isMgrOfTask && !ownEdit) return Promise.reject(new Error('Bạn không có quyền sửa công việc này.'));
     if (!isMgrOfTask && String(p.assigneeCode).trim() !== u.code) return Promise.reject(new Error('Bạn chỉ được sửa việc của chính mình.'));
     if (!String(p.title||'').trim()) return Promise.reject(new Error('Vui lòng nhập tên công việc.'));
     var as = db.members.filter(function(m){return m.code===p.assigneeCode && m.active;})[0];
     if (!as) return Promise.reject(new Error('Người được giao việc không hợp lệ.'));
     if (t.crewTask && !isCrewRole(as.role)) return Promise.reject(new Error('Chỉ giao task crew cho thành viên Production Crew.'));
     if (!t.crewTask && !hasDeptBoard(as.role)) return Promise.reject(new Error('Việc của Phòng chỉ giao cho nhân sự có mặt ở Phòng.'));
     if (!(t.crewTask && isCrewAdmin(u)) && outranksWithinSilo(u.role, as.role)) return Promise.reject(new Error('Không thể giao việc cho người có vai trò cao hơn.'));
     if (db.config[p.difficulty] === undefined) return Promise.reject(new Error('Độ khó không hợp lệ.'));
     t.title = p.title; t.description = p.description||''; t.assigneeCode = p.assigneeCode; t.difficulty = p.difficulty; t.kpiPoint = db.config[p.difficulty];
     t.priority = (PRIORITY_ORDER.indexOf(p.priority)>=0?p.priority:'Bình thường'); t.deadline = p.deadline||'';
     if (t.projectId) { var prjU = (db.projects||[]).filter(function(x){return x.id===t.projectId;})[0]; if (prjU && t.deadline && prjU.eventDate && t.deadline > prjU.eventDate) return Promise.reject(new Error('Hạn công việc không được trễ hơn ngày sự kiện của dự án (' + prjU.eventDate + ').')); }
     t.note = p.note!=null?p.note:t.note;
     if (p.category !== undefined) { var c = String(p.category||'').trim(); t.category = (c && WORK_CATEGORIES.indexOf(c)>=0) ? c : ''; }
     if (p.phatSinh !== undefined) t.phatSinh = (!!p.phatSinh) && !!t.projectId;
     mockSave(db); return Promise.resolve(t);
   },
   deleteTask: function (tk, code) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u) return Promise.reject(new Error('SESSION_EXPIRED'));
     var t = db.tasks.filter(function (x) { return x.taskCode === code; })[0];
     if (!t) return Promise.reject(new Error('Không tìm thấy công việc.'));
     var canMgr = t.crewTask ? canManageCrew(u) : isManager(u);
     var ownDelete = (t.assigneeCode === u.code) && (deptScopeOf(u.role)==='own' || isCrewRole(u.role));
     if (!canMgr && !ownDelete) return Promise.reject(new Error('Bạn không có quyền xoá công việc này.'));
     db.tasks = db.tasks.filter(function (x) { return x.taskCode !== code; });
     mockSave(db); return Promise.resolve({ ok: true });
   },
   createProject: function (tk, p) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u || !isManager(u)) return Promise.reject(new Error('Không có quyền.'));
     db.projects = db.projects || [];
     var code = 'PRJ-' + new Date().getFullYear() + '-' + ('00' + (db.projects.length + 1)).slice(-3);
     var prj = { id: code, name: p.name, leadCode: p.leadCode, memberCodes: p.memberCodes || [], eventDate: p.eventDate, status: PROJ_STATUS.ACTIVE, createdAt: getLocalIso() };
     db.projects.push(prj); mockSave(db); return Promise.resolve(prj);
   },
   updateProject: function (tk, p) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u || !isManager(u)) return Promise.reject(new Error('Không có quyền.'));
     var prj = db.projects.filter(function(x){return x.id === p.id})[0];
     if (!prj) return Promise.reject(new Error('Không tìm thấy dự án.'));
     prj.name = p.name; prj.leadCode = p.leadCode; prj.memberCodes = p.memberCodes || []; prj.eventDate = p.eventDate;
     mockSave(db); return Promise.resolve(prj);
   },
   completeProject: function (tk, id) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u || !isManager(u)) return Promise.reject(new Error('Không có quyền.'));
     var prj = db.projects.filter(function(x){return x.id === id})[0];
     if (prj) { prj.status = PROJ_STATUS.COMPLETED; mockSave(db); return Promise.resolve(prj); }
     return Promise.reject(new Error('Không tìm thấy project.'));
   },
   deleteProject: function (tk, id) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u || !isManager(u)) return Promise.reject(new Error('Không có quyền.'));
     if (!db.projects.filter(function(x){return x.id === id;})[0]) return Promise.reject(new Error('Không tìm thấy dự án.'));
     db.projects = db.projects.filter(function (x) { return x.id !== id; });
     db.tasks = db.tasks.filter(function (t) { return t.projectId !== id; }); // xoá luôn task của dự án
     mockSave(db); return Promise.resolve({ ok: true });
   },
   changePassword: function (tk, oldPin, newPin) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u) return Promise.reject(new Error('SESSION_EXPIRED'));
     var m = db.members.filter(function (x) { return x.code === u.code; })[0];
     if (m.pin !== String(oldPin)) return Promise.reject(new Error('Mã cá nhân hiện tại không đúng.'));
     m.pin = String(newPin); mockSave(db); return Promise.resolve({ ok: true });
   },
   setCrewRole: function (tk, code, crewRole) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u || !canManageCrew(u)) return Promise.reject(new Error('Bạn không có quyền quản lý Production Crew.'));
     var newRole = crewRole ? String(crewRole) : ROLE.STAFF;
     if (crewRole && CREW_ROLES.indexOf(crewRole) < 0) return Promise.reject(new Error('Vai trò Production Crew không hợp lệ.'));
     var m = db.members.filter(function (x) { return x.code === String(code).toUpperCase(); })[0];
     if (!m) return Promise.reject(new Error('Không tìm thấy thành viên.'));
     if (m.role === ROLE.HEAD || m.role === ROLE.DEPUTY) return Promise.reject(new Error('Không thể đổi vai trò của Trưởng/Phó phòng tại đây.'));
     if (!isManager(u) && !isCrewRole(m.role)) return Promise.reject(new Error('Chỉ Trưởng/Phó phòng mới được đưa người của Phòng vào Production Crew.'));
     if (!isCrewAdmin(u) && rankOf(m.role) <= rankOf(u.role)) return Promise.reject(new Error('Chỉ được đổi vai trò thành viên crew có cấp thấp hơn bạn.'));
     m.role = newRole; mockSave(db); return Promise.resolve({ ok: true });
   },
   setGrant: function (tk, code, key, value) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u || !isManager(u)) return Promise.reject(new Error('Chỉ Trưởng/Phó phòng mới có quyền phân quyền.'));
     if (GRANT_KEYS.indexOf(key) < 0) return Promise.reject(new Error('Quyền không hợp lệ.'));
     var m = db.members.filter(function (x) { return x.code.toUpperCase() === String(code).toUpperCase(); })[0];
     if (!m) return Promise.reject(new Error('Không tìm thấy thành viên.'));
     m.grants = m.grants || []; var i = m.grants.indexOf(key);
     if (value && i < 0) m.grants.push(key); else if (!value && i >= 0) m.grants.splice(i, 1);
     mockSave(db); return Promise.resolve({ ok: true, code: m.code, grants: m.grants });
   },
   saveAvatar: function (tk, dataUrl) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u) return Promise.reject(new Error('SESSION_EXPIRED'));
     dataUrl = String(dataUrl == null ? '' : dataUrl);
     if (dataUrl && !/^data:image\/(png|jpe?g|webp|gif);base64,/i.test(dataUrl)) return Promise.reject(new Error('Ảnh không hợp lệ.'));
     if (dataUrl.length > 200000) return Promise.reject(new Error('Ảnh quá lớn (tối đa ~150KB sau nén).'));
     var m = db.members.filter(function (x) { return x.code === u.code; })[0];
     if (!m) return Promise.reject(new Error('Không tìm thấy thành viên.'));
     m.avatar = dataUrl;
     mockSave(db); return Promise.resolve({ ok: true, code: u.code, avatar: dataUrl });
   },
   setKpiTarget: function (tk, targets) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u || !isHead(u)) return Promise.reject(new Error('Không có quyền phân KPI.'));
     db.kpiTargets = db.kpiTargets || {};
     Object.keys(targets).forEach(function (c) { db.kpiTargets[c] = parseFloat(targets[c]) || 0; });
     mockSave(db); return Promise.resolve({ ok: true });
   },
   upsertMember: function (tk, p) {
     var db = mockDB(); var u = this._user(db, tk);
     if (!u || !isManager(u)) return Promise.reject(new Error('Chỉ Trưởng phòng / Phó phòng mới có quyền quản lý nhân sự.'));
     var code = String(p.code || '').trim().toUpperCase();
     var origCode = String(p.origCode || '').trim().toUpperCase();
     if (!code) return Promise.reject(new Error('Vui lòng nhập mã thành viên.'));
     if (!String(p.name||'').trim()) return Promise.reject(new Error('Vui lòng nhập họ tên.'));
     var lookup = origCode || code;
     var existing = db.members.filter(function (m) { return m.code.toUpperCase() === lookup; })[0];
     if (origCode && !existing) return Promise.reject(new Error('Không tìm thấy thành viên cần sửa.'));
     if (!origCode && existing) return Promise.reject(new Error('Mã thành viên đã tồn tại.'));
     // Mã (mới) không được trùng người khác (loại trừ chính dòng đang sửa).
     if (db.members.some(function (m) { return m.code.toUpperCase() === code && m.code.toUpperCase() !== origCode; }))
       return Promise.reject(new Error('Mã thành viên đã tồn tại.'));
     if (existing) {
       var oldCode = existing.code;
       existing.name = p.name || existing.name;
       existing.role = p.role || existing.role;
       existing.title = p.title != null ? p.title : existing.title;
       if (p.pin && p.pin.length >= 4) existing.pin = p.pin;
       if (p.active != null) existing.active = p.active;
       existing.code = code; // có thể đổi mã
       if (oldCode.toUpperCase() !== code) {
         // Cascade mọi tham chiếu sang mã mới.

 // ================== LỊCH CÁ NHÂN ==================
 var CAL_DOW = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
 function fmtYmd(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
 function calChip(t, showName) {
   var who = showName ? '<div class="cal-chip-who">' + esc(isUnclaimed(t) ? 'Chưa giao' : memberName(t.assigneeCode)) + '</div>' : '';
   return '<div class="cal-chip ' + (STATUS_CLASS[t.status] || '') + '" data-action="open-task-detail" data-code="' + esc(t.taskCode) + '" title="' + esc(t.title) + ' — ' + esc(isUnclaimed(t) ? 'Chưa giao' : memberName(t.assigneeCode)) + ' — ' + esc(t.status) + '">' + esc(t.title) + who + '</div>';
 }
 // Bảng chi tiết "việc trong ngày" hiện bên dưới lịch khi chọn 1 ngày.
 function calDayDetail(tasksArr, showName) {
   var sel = state.calSelectedDay; if (!sel) return '';
   var dts = (tasksArr || []).filter(function (t) { return ymd(t.deadline) === sel; });
   if (!dts.length) return '';
   var rows = dts.slice().sort(function (a, b) { return (PRIORITY_RANK[a.priority]||2)-(PRIORITY_RANK[b.priority]||2); }).map(function (t) {
     return '<div class="task-row' + (isUnclaimed(t) ? ' task-row--unclaimed' : '') + '" data-action="open-task-detail" data-code="' + esc(t.taskCode) + '">' +

   }).join('');
   return '<div class="card stack" style="margin-top:12px"><div class="row row--between"><h3>📌 Việc đến hạn ngày ' + esc(fmtDateVN(sel)) + ' (' + dts.length + ')</h3><button class="btn btn--ghost btn--sm" data-action="cal-clear-day">✕ Đóng</button></div><div class="task-rows">' + rows + '</div></div>';
 }
 // Dựng lưới lịch (grid + khay chưa hạn) cho MỘT tập task bất kỳ, theo state.period hiện tại.
 function buildCalGrid(tasksArr, opts) {
   var showName = !!(opts && opts.showName);
   var p = state.period;
   var dayMap = {}, monthCount = {}, withDl = 0;
   tasksArr.forEach(function (t) {
     var dl = ymd(t.deadline);
     if (!dl) return;
     withDl++;
     (dayMap[dl] = dayMap[dl] || []).push(t);
     var mk = dl.substring(0, 7); monthCount[mk] = (monthCount[mk] || 0) + 1;
   });
   var today = todayStr();
   var grid = '';

   if (p.type === 'week') {
     var mon = mondayOf(parseYmd(p.anchor));
     var cols = '';
     for (var i = 0; i < 7; i++) {
       var d = new Date(mon); d.setDate(mon.getDate() + i);
       var key = fmtYmd(d), isToday = (key === today), dts = dayMap[key] || [];
       cols += '<div class="cal-week-col' + (isToday ? ' cal-cell--today' : '') + (key === state.calSelectedDay ? ' cal-week-col--sel' : '') + '" data-action="cal-pick-day" data-ymd="' + key + '" style="cursor:pointer">' +
         '<div class="cal-col-head">' + CAL_DOW[i] + ' · ' + pad2(d.getDate()) + '/' + pad2(d.getMonth() + 1) + (isToday ? ' <span class="cal-today-dot">hôm nay</span>' : '') + '</div>' +
         (dts.length ? dts.map(function (t) { return calChip(t, showName); }).join('') : '<div class="cal-empty">—</div>') + '</div>';
     }
     grid = '<div class="cal-grid cal-grid--week">' + cols + '</div>';

   } else if (p.type === 'year') {
     var yr = parseYmd(p.anchor).getFullYear();
     var cards = '';
     for (var mo = 0; mo < 12; mo++) {
       var ym = yr + '-' + pad2(mo + 1), cnt = monthCount[ym] || 0;
       cards += '<div class="cal-month-card' + (cnt ? ' has-tasks' : '') + '" data-action="cal-month" data-ym="' + ym + '">' +
         '<div class="mc-name">Tháng ' + (mo + 1) + '</div><div class="mc-count">' + cnt + '</div><div class="mc-sub">công việc</div></div>';
     }
     grid = '<div class="cal-year">' + cards + '</div>';

   } else { // month
     var anchorD = parseYmd(p.anchor), year = anchorD.getFullYear(), month = anchorD.getMonth();
     var first = new Date(year, month, 1);
     var firstOffset = (first.getDay() + 6) % 7;
     var daysInMonth = new Date(year, month + 1, 0).getDate();
     var weeks = Math.ceil((firstOffset + daysInMonth) / 7);
     var gridStart = mondayOf(first);
     var head = CAL_DOW.map(function (s) { return '<div class="cal-dow">' + s + '</div>'; }).join('');
     var cells = '';
     for (var k = 0; k < weeks * 7; k++) {
       var dd = new Date(gridStart); dd.setDate(gridStart.getDate() + k);
       var ckey = fmtYmd(dd), out = (dd.getMonth() !== month), isT = (ckey === today), cts = dayMap[ckey] || [];
       var chips = cts.slice(0, 3).map(function (t) { return calChip(t, showName); }).join('') +
         (cts.length > 3 ? '<div class="cal-more" data-action="cal-pick-day" data-ymd="' + ckey + '">+' + (cts.length - 3) + ' nữa…</div>' : '');
       cells += '<div class="cal-cell' + (out ? ' cal-cell--out' : '') + (isT ? ' cal-cell--today' : '') + (ckey === state.calSelectedDay ? ' cal-cell--sel' : '') + '" data-action="cal-pick-day" data-ymd="' + ckey + '">' +
         '<div class="cal-daynum">' + dd.getDate() + '</div>' + chips + '</div>';
     }
     grid = '<div class="cal-grid cal-grid--month">' + head + cells + '</div>';
   }

   // Khay việc CHƯA CÓ HẠN (không lên lịch được) — chỉ ở Tuần/Tháng.
   var tray = '';
   if (p.type !== 'year') {
     var noDl = tasksArr.filter(function (t) { return !ymd(t.deadline); });
     if (noDl.length) {
       tray = '<div class="card" style="margin-top:14px;padding:14px 16px;background:rgba(255,255,255,0.4)">' +
         '<div class="text-sm muted" style="margin-bottom:8px">🕓 Chưa đặt hạn (' + noDl.length + ') — không hiển thị trên lịch</div>' +
         '<div class="row row--wrap" style="gap:6px">' +
         noDl.map(function (t) { return '<span class="cal-chip ' + (STATUS_CLASS[t.status] || '') + '" data-action="task-note" data-code="' + esc(t.taskCode) + '" style="display:inline-block;max-width:220px">' + esc(t.title) + (showName ? ' · ' + esc(memberName(t.assigneeCode)) : '') + '</span>'; }).join('') +
         '</div></div>';
     }
   }
   return { html: grid + tray + calDayDetail(tasksArr, showName), withDl: withDl };
 }

 // Dashboard QUẢN LÝ: bộ lọc vai trò + 4 BẢNG (số task · TG hoàn thành TB · TG tạm hoãn TB · tỷ lệ đúng/trễ/sớm) + chi tiết thanh ngang — tất cả thu gọn được.

   var pt = state.period.type, pa = state.period.anchor, today = todayStr();
   state.teamOpen = state.teamOpen || {};

   var fkey = isCrew ? 'crew' : 'dept';
   var roleFilter = state.teamFilter[fkey] || '';

   var roleSet = []; allPeople.forEach(function (m) { if (roleSet.indexOf(m.role) < 0) roleSet.push(m.role); });
   var people = allPeople.filter(function (m) { return !roleFilter || m.role === roleFilter; });
   var data = people.map(function (m) {

     var s = computeStats(mine, pt, pa);
     var mo = computeStats(mine, 'month', today);
     return { m: m, total: mine.length, s: s, avgCycleH: s.avgCycleH, avgPauseH: s.avgPauseH, perMonth: mo.totalInP, pri: mo.byPriority, punc: s.punc, byStatus: s.byStatus };
   });

   var roleSel = '<select id="team-role" style="max-width:210px"><option value="">— Tất cả vai trò —</option>' + roleSet.map(function (r) { return '<option value="' + esc(r) + '"' + (roleFilter === r ? ' selected' : '') + '>' + esc(ROLE_LABEL[r] || r) + '</option>'; }).join('') + '</select>';

   }

     return '<div class="table-wrap"><table><thead><tr>' + headcells + '</tr></thead><tbody>' + (rowsHtml || '<tr><td colspan="' + (cols||6) + '" class="center muted text-sm">Chưa có dữ liệu.</td></tr>') + '</tbody></table></div>';
   }
   var nameCell = function (d) { return '<td><b>' + esc(d.m.name) + '</b> <span class="role-badge ' + (ROLE_CLASS[d.m.role] || '') + '">' + esc(ROLE_LABEL[d.m.role] || d.m.role) + '</span></td>'; };

   var t1 = coll('t-count', '📊 Số lượng công việc', function () {

     return tbl('<th>Nhân sự</th><th class="center">Tổng</th><th class="center">Mới</th><th class="center">Đang làm</th><th class="center">Đã gửi</th><th class="center">Hoàn thành</th>', rows, 6);
   });
   var t2 = coll('t-cycle', '⏱️ Thời gian hoàn thành trung bình (Bắt đầu → Hoàn thành)', function () {
     var rows = data.map(function (d) { return '<tr>' + nameCell(d) + '<td class="center">' + d.s.doneCount + '</td><td class="right"><b>' + fmtH(d.avgCycleH) + '</b></td></tr>'; }).join('');

   var t4 = coll('t-punc', '🎯 Tỷ lệ đúng / trễ / sớm deadline (việc hoàn thành trong kỳ)', function () {
     var rows = data.map(function (d) { var p = d.punc; var tot = (p.som+p.dung+p.tre)||0; var pc = function (n) { return tot ? Math.round(n/tot*100)+'%' : '—'; }; return '<tr>' + nameCell(d) + '<td class="center" style="color:#1e8040">' + p.som + ' (' + pc(p.som) + ')</td><td class="center" style="color:var(--c-secondary-active)">' + p.dung + ' (' + pc(p.dung) + ')</td><td class="center" style="color:#dc2626">' + p.tre + ' (' + pc(p.tre) + ')</td></tr>'; }).join('');

   var detail = coll('t-bars', '📈 Chi tiết theo người (biểu đồ thanh)', function () {

     var barCards = data.map(function (d) {

       var stacked = PRIORITY_ORDER.map(function (p) { var w = (d.pri[p] || 0) / tot * 100; return w > 0 ? '<div style="height:100%;width:' + w + '%;background:' + PRI_COLOR[p] + '" title="' + p + ': ' + (d.pri[p] || 0) + '"></div>' : ''; }).join('');
       return '<div class="card stack" style="padding:16px 18px">' +
         '<div class="row row--between"><b>' + esc(d.m.name) + '</b><span class="role-badge ' + (ROLE_CLASS[d.m.role] || '') + '">' + esc(ROLE_LABEL[d.m.role] || d.m.role) + '</span></div>' +
         barRow(d.total, maxT, '#17479D', 'Số task', d.total) +
         barRow(d.avgCycleH, maxC, '#34c759', 'TG hoàn thành TB', fmtH(d.avgCycleH)) +
         barRow(d.avgPauseH, maxP, '#ff9500', 'TG tạm hoãn TB', fmtH(d.avgPauseH)) +
         barRow(d.perMonth, maxM, '#EE6823', 'Task / tháng này', d.perMonth) +
         '<div class="text-xs faint" style="margin-top:8px;margin-bottom:3px">Mức độ ưu tiên (tháng này)</div>' +
         '<div class="kpi-bar" style="display:flex">' + (stacked || '<div style="width:100%;background:rgba(0,0,0,0.05)"></div>') + '</div>' +
         '</div>';
     }).join('');
     return legend + '<div class="grid-cards">' + (barCards || '<div class="empty text-sm">Chưa có nhân sự.</div>') + '</div>';
   });

   var who = isCrew ? 'thành viên crew' : 'nhân sự';
   var head = '<div class="row row--wrap" style="margin-bottom:14px;gap:12px;align-items:center">' + periodControl() + '<div class="spacer"></div>' + roleSel + exportBtn + '</div>';
   var empty = data.length ? '' : '<div class="card empty"><div class="big">👥</div><p>Chưa có ' + who + '.</p></div>';
   setView(head + empty + t1 + t2 + t3 + t4 + detail);
   var rs = el('team-role'); if (rs) rs.addEventListener('change', function () { state.teamFilter[fkey] = this.value; renderPage(); });
 }
 function drawShareChart(data) {
   if (chartInstances.share) { chartInstances.share.destroy(); chartInstances.share = null; }
   var ctx = el('shareChart'); if (!ctx) return;
   Chart.defaults.font.family = "'Inter', -apple-system, sans-serif"; Chart.defaults.color = '#86868b';
   var labels = [], vals = []; data.forEach(function (d) { if (d.total > 0) { labels.push(d.m.name); vals.push(d.total); } });
   if (!vals.length) { ctx.parentElement.innerHTML = '<div class="empty faint" style="padding-top:40px">Chưa có task.</div>'; return; }
   var palette = ['#EE6823', '#17479D', '#21217D', '#34c759', '#af52de', '#ff9500', '#5ac8fa', '#ffcc00'];
   chartInstances.share = new Chart(ctx, {
     type: 'doughnut',
     data: { labels: labels, datasets: [{ data: vals, backgroundColor: labels.map(function (_, i) { return palette[i % palette.length]; }), borderWidth: 2, borderColor: '#ffffff' }] },
     options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { position: 'right', labels: { usePointStyle: true } } } }
   });
 }

 function renderProjectDetail(id) {

           '<td><b>'+esc(t.title)+'</b>'+(t.phatSinh?' <span class="tag" style="font-size:10px;padding:1px 6px;background:rgba(255,149,0,0.15);color:#c05600;border-color:rgba(255,149,0,0.35)">⚡ PS</span>':'')+'</td>' +
           '<td><span class="pri '+(PRIORITY_CLASS[t.priority]||'')+'" style="font-size:11px">'+esc(t.priority)+'</span></td>' +
           '<td class="text-xs">'+esc(t.difficulty)+'</td>' +
           '<td class="text-xs">'+(t.deadline?esc(fmtDateVN(t.deadline)):'—')+'</td>' +
           '<td><span class="pill '+(STATUS_CLASS[t.status]||'')+'" style="font-size:11px"><span class="dot"></span>'+esc(t.status)+'</span></td></tr>';
       }).join('');
       return '<div style="margin-top:14px"><div class="row row--between" style="margin-bottom:6px"><b>'+who+'</b><span class="faint text-xs">'+dn+'/'+arr.length+' xong</span></div>' +
         '<div class="table-wrap"><table><thead><tr><th>Mã</th><th>Công việc</th><th>Ưu tiên</th><th>Độ khó</th><th>Hạn</th><th>Trạng thái</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
     }).join('');
   }
   taskHtml += '</div>';
   html += taskHtml;

   // Thống kê & KPI Độc lập của Project
   var membersKpiHtml = '';
   if (totalT === 0) {
     membersKpiHtml = '<tr><td colspan="4" class="center muted text-sm">Chưa có số liệu.</td></tr>';
   } else {
     var memberStats = {};
     // CHỈ thống kê những thành viên viewer được phép thấy (ẩn người cấp cao / khác silo).
     p.memberCodes.forEach(function(c){ if (canSeeMember(c)) memberStats[c] = { assigned:0, done:0 }; });
     pTasks.forEach(function(t) {
       if(!canSeeMember(t.assigneeCode)) return;
       if(!memberStats[t.assigneeCode]) memberStats[t.assigneeCode] = {assigned:0, done:0};
       memberStats[t.assigneeCode].assigned++;
       if(t.status === STATUS.DONE) memberStats[t.assigneeCode].done++;
     });
     
     membersKpiHtml = Object.keys(memberStats).map(function(c) {
       var ms = memberStats[c];
       var kpiPct = Math.round((ms.done / totalT) * 100);
       return '<tr><td><b>' + esc(memberName(c)) + '</b></td>' +
         '<td class="center">' + ms.assigned + '</td><td class="center">' + ms.done + '</td>' +
         '<td class="right"><b style="color:var(--c-project)">' + kpiPct + '%</b></td></tr>';
     }).join('');
   }

   html += '<div class="card stack"><h3>Hệ thống KPI Độc lập Dự án</h3>' +
     '<p class="text-sm muted">Chỉ tính phần công việc của mỗi chuyên viên dựa trên tổng số task dự án đang có.</p>' +
     '<div class="table-wrap"><table><thead><tr><th>Chuyên viên</th><th class="center">Việc giao</th><th class="center">Hoàn thành</th><th class="right">% / Tổng dự án</th></tr></thead><tbody>' +
     membersKpiHtml +
     '</tbody></table></div></div>';

   html += '</div>';
   setView(html);
 }

 // ================== TASKS & NOTES ==================
 function taskActions(t) {
   var u = state.user;
   var btns = [];
   // Việc CHƯA ĐĂNG KÝ: người đủ điều kiện có thể NHẬN (đăng ký) việc.
   if (isUnclaimed(t)) {
     var canClaim = t.crewTask ? (isCrewRole(u.role) || canManageCrew(u)) : hasDeptBoard(u.role);
     if (canClaim) btns.push('<button class="btn btn--primary btn--sm" data-action="task-claim" data-code="' + esc(t.taskCode) + '">🙋 Nhận việc</button>');
     if (canForceStatus(t)) {} // quản lý vẫn sửa/xoá qua kebab
     return btns.join('');
   }
   // Chính chủ: luồng chuẩn (bắt đầu / tạm hoãn / gửi draft / xác nhận hoàn thành / ghi chú).
   if (t.assigneeCode === u.code) {
     if (t.status === STATUS.TODO) btns.push('<button class="btn btn--secondary btn--sm" data-action="task-start" data-code="' + esc(t.taskCode) + '">Bắt đầu</button>');
     else if (t.status === STATUS.RUNNING) {
       btns.push('<button class="btn btn--ghost btn--sm" data-action="task-pause" data-code="' + esc(t.taskCode) + '">Tạm hoãn</button>');
       btns.push('<button class="btn btn--primary btn--sm" data-action="task-submit" data-code="' + esc(t.taskCode) + '">Gửi draft</button>');
     } else if (t.status === STATUS.PENDING) btns.push('<button class="btn btn--secondary btn--sm" data-action="task-resume" data-code="' + esc(t.taskCode) + '">Tiếp tục</button>');
     else if (t.status === STATUS.SENT) btns.push('<button class="btn btn--success btn--sm" data-action="task-complete" data-code="' + esc(t.taskCode) + '">Xác nhận hoàn thành</button>');
     btns.push('<button class="btn btn--ghost btn--sm" data-action="task-note" data-code="' + esc(t.taskCode) + '">📝 Ghi chú</button>');
   }
   // Quản lý (Leader/Sub-lead/Trưởng/Phó phòng) xem việc của NGƯỜI KHÁC: ÉP đổi trạng thái.
   else if (canForceStatus(t)) {
     btns.push('<button class="btn btn--ghost btn--sm" data-action="force-status" data-code="' + esc(t.taskCode) + '">⚙️ Đổi trạng thái</button>');
   }
   return btns.join('');
 }

 // MỤC GỘP "Công việc": 2 tab con (Công việc daily | Dự án) + bộ lọc kỳ riêng mỗi tab. silo: 'dept' | 'crew'.
 function renderWork(silo) {
   silo = silo || 'dept';
   var isCrew = silo === 'crew';
   var u = state.user, mgr = isCrew ? canManageCrew(u) : isManager(u);
   var canSelf = isCrew ? isCrewRole(u.role) : (deptScopeOf(u.role) === 'own');
   var tab = isCrew ? (state.crewWorkTab || 'daily') : (state.workTab || 'daily');
   var whichDaily = isCrew ? 'crewdaily' : 'daily';
   var whichProj = isCrew ? 'crewprojects' : 'projects';
   var tabAction = isCrew ? 'crew-work-tab' : 'work-tab';
   if (isCrew) setTitle('🎬 Production Crew — Công việc', 'Công việc daily & Dự án của Production Crew');
   else setTitle('Công việc', 'Công việc daily & Dự án — Trung Tâm Truyền Thông');
   var view = state.workView || 'grid';
   var viewSeg = (tab !== 'projects') ? '<div class="seg"><button data-action="work-view" data-view="grid"' + (view === 'grid' ? ' class="is-active"' : '') + '>▦ Lưới</button><button data-action="work-view" data-view="list"' + (view === 'list' ? ' class="is-active"' : '') + '>☰ Chi tiết</button></div>' : '';
   var seg = '<div class="row row--wrap" style="gap:14px;align-items:center;margin-bottom:18px"><div class="seg">' +
     '<button data-action="' + tabAction + '" data-tab="daily"' + (tab === 'daily' ? ' class="is-active"' : '') + '>📋 Công việc daily</button>' +
     '<button data-action="' + tabAction + '" data-tab="projects"' + (tab === 'projects' ? ' class="is-active"' : '') + '>🚀 Dự án</button></div>' + viewSeg + '</div>';
   var wireDaily = false, html;
   if (tab === 'projects') {
     html = seg + periodControlFor(whichProj) + workProjectsBody(isCrew, mgr, whichProj);
   } else {
     html = seg + periodControlFor(whichDaily) + workDailyBody(isCrew, mgr, canSelf, whichDaily);
     wireDaily = true;
   }
   setView(html);
   if (wireDaily) {
     var f = state.filters;
     var apply = function () { f.q = (el('f-q')||{}).value||''; f.status = (el('f-status')||{}).value||''; f.assignee = mgr ? ((el('f-assignee')||{}).value||'') : ''; renderPage(); };
     ['f-status', 'f-assignee'].forEach(function (id) { var n = el(id); if (n) n.addEventListener('change', apply); });
     var sBtn = el('f-search-btn'); if (sBtn) sBtn.addEventListener('click', apply);
     var cBtn = el('f-clear-btn'); if (cBtn) cBtn.addEventListener('click', function () { f.q = ''; renderPage(); });
   }
 }
 function workDailyBody(isCrew, mgr, canSelf, which) {
   var f = state.filters;
   var list = state.tasks.filter(function (t) {
     if (isCrew ? !t.crewTask : t.crewTask) return false;
     if (t.projectId) return false; // daily = không thuộc dự án
     if (!inWorkPeriod(t.createdAt, which)) return false;
     if (f.status && t.status !== f.status) return false;
     if (mgr && f.assignee && t.assigneeCode !== f.assignee) return false;
     if (f.q && !(t.title||'').toLowerCase().includes(f.q.toLowerCase()) && !(t.taskCode||'').toLowerCase().includes(f.q.toLowerCase())) return false;
     return true;
   }).sort(function (a, b) { return (isUnclaimed(b)?1:0)-(isUnclaimed(a)?1:0) || (PRIORITY_RANK[a.priority]||2)-(PRIORITY_RANK[b.priority]||2) || (b.createdAt||'').localeCompare(a.createdAt||''); });
   var createBtn = (mgr || canSelf) ? '<button class="btn btn--primary" data-action="' + (isCrew ? 'open-create-crew' : 'open-create') + '">+ ' + (mgr ? (isCrew ? 'Giao việc crew' : 'Giao việc daily') : 'Thêm việc của tôi') + '</button>' : '';
   var toolbar = '<div class="card" style="padding:16px 24px;margin-bottom:24px"><div class="row row--wrap" style="gap:12px">' +
     '<div class="row" style="gap:6px"><input id="f-q" placeholder="Tìm tên/mã..." value="' + esc(f.q) + '" style="max-width:200px"><button class="btn btn--secondary btn--sm" id="f-search-btn">Tìm</button>' + (f.q?'<button class="icon-btn" id="f-clear-btn">✕</button>':'') + '</div>' +
     '<select id="f-status" style="max-width:150px"><option value="">Mọi trạng thái</option>' + STATUS_FILTER_ORDER.map(function(s){return '<option value="'+esc(s)+'" '+(f.status===s?'selected':'')+'>'+esc(s)+'</option>';}).join('') + '</select>' +
     (mgr ? '<select id="f-assignee" style="max-width:150px"><option value="">Mọi người</option>' + state.members.filter(function(m){return m.active && (isCrew?isCrewRole(m.role):hasDeptBoard(m.role));}).map(function(m){return '<option value="'+esc(m.code)+'" '+(f.assignee===m.code?'selected':'')+'>'+esc(m.name)+'</option>';}).join('') + '</select>' : '') +
     '<div class="spacer"></div>' + createBtn + '</div></div>';
   var view = state.workView || 'grid';
   var cards;
   if (!list.length) cards = '<div class="card empty"><div class="big">🗂️</div><p>Không có công việc daily trong kỳ này.</p></div>';
   else if (view === 'list') cards = '<div class="task-rows">' + list.map(taskRow).join('') + '</div>';
   else cards = '<div class="task-list task-list--grid">' + list.map(taskCard).join('') + '</div>';
   return toolbar + cards;
 }
 // Hàng gọn cho chế độ "Chi tiết / Danh sách".
 function taskRow(t) {
   return '<div class="task-row' + (isUnclaimed(t) ? ' task-row--unclaimed' : '') + '" data-action="open-task-detail" data-code="' + esc(t.taskCode) + '">' +

     '<span class="tr-meta">👤 ' + (isUnclaimed(t) ? 'Chưa giao' : esc(memberName(t.assigneeCode))) + (t.deadline ? ' · ⏰ ' + esc(fmtDateVN(t.deadline)) : '') + '</span>' +

 function workProjectsBody(isCrew, mgr, which) {
   if (isCrew) {
     // Dự án của Crew = task crew GẮN vào dự án (liên kết dự án Trung Tâm), gom theo dự án.
     var cpTasks = state.tasks.filter(function (t) { return t.crewTask && t.projectId && inWorkPeriod(t.createdAt, which); });
     var byProj = {}; cpTasks.forEach(function (t) { (byProj[t.projectId] = byProj[t.projectId] || []).push(t); });
     var ids = Object.keys(byProj);
     var head = '<div class="row row--between" style="margin-bottom:18px"><div class="faint text-sm">Task crew thuộc ' + ids.length + ' dự án</div>' +
       (mgr ? '<button class="btn btn--primary" data-action="open-create-crew-proj">+ Giao việc crew vào dự án</button>' : '') + '</div>';
     if (!ids.length) return head + '<div class="card empty"><div class="big">🚀</div><p>Chưa có task crew nào thuộc dự án. Dự án dùng chung với Trung Tâm.</p></div>';
     var blocks = ids.map(function (id) {
       var p = state.projects.filter(function (x) { return x.id === id; })[0], nm = p ? p.name : id;
       var arr = byProj[id].sort(function (a, b) { return (PRIORITY_RANK[a.priority]||2)-(PRIORITY_RANK[b.priority]||2); });
       return '<div class="text-sm muted" style="margin:10px 0 6px;font-weight:700">🚀 ' + esc(nm) + ' <span class="mono faint text-xs">' + esc(id) + '</span></div><div class="task-list">' + arr.map(taskCard).join('') + '</div>';
     }).join('');
     return head + blocks;
   }
   var projs = state.projects.filter(function (p) { return inWorkPeriod(p.createdAt, which); });
   var html = '<div class="row row--between" style="margin-bottom:18px"><div class="faint text-sm">Có ' + projs.length + ' dự án trong kỳ</div>' +
     (mgr ? '<button class="btn btn--primary" data-action="open-create-project">+ Tạo Dự án mới</button>' : '') + '</div>';
   if (!projs.length) return html + '<div class="card empty"><div class="big">🚀</div><p>Chưa có dự án nào trong kỳ này.</p></div>';
   return html + '<div class="grid-cards">' + projs.map(projectCard).join('') + '</div>';
 }

 // ================== PRODUCTION CREW ==================
 function drawCrewChart(crewTasks, crewMembers) {
   if (chartInstances.crewDept) { chartInstances.crewDept.destroy(); chartInstances.crewDept = null; }
   if (chartInstances.crewMember) { chartInstances.crewMember.destroy(); chartInstances.crewMember = null; }
   Chart.defaults.font.family = "'Inter', -apple-system, sans-serif"; Chart.defaults.color = "#86868b";
   var s = computeStats(crewTasks, state.period.type, state.period.anchor);
   var ctx = el('crewTaskChart');
   if (ctx) {
     var done = s.completedInP, rem = Math.max(0, s.totalInP - done);
     chartInstances.crewDept = new Chart(ctx, { type: 'doughnut',
       data: { labels: ['Hoàn thành', 'Chưa xong'], datasets: [{ data: [done, rem], backgroundColor: ['#ff2d55', 'rgba(0,0,0,0.05)'], borderWidth: 0 }] },
       options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { usePointStyle: true } } } } });
   }
   var ctxM = el('crewMemberChart');
   if (ctxM) {
     var colors = ['rgba(255,45,85,0.85)','rgba(23, 71, 157,0.85)','rgba(52,199,89,0.85)','rgba(255,159,10,0.85)','rgba(175,82,222,0.85)','rgba(90,200,250,0.85)'];
     var rows = crewMembers.map(function (m) { return { m: m, s: computeStats(crewTasks.filter(function(t){return t.assigneeCode===m.code;}), state.period.type, state.period.anchor) }; }).sort(function(a,b){return b.s.donePts-a.s.donePts;});
     var labels = [], data = [];
     rows.forEach(function (r) { if (r.s.donePts > 0) { labels.push(r.m.name); data.push(r.s.donePts); } });
     if (data.length) chartInstances.crewMember = new Chart(ctxM, { type: 'pie',
       data: { labels: labels, datasets: [{ data: data, backgroundColor: data.map(function(_,i){return colors[i%colors.length];}), borderWidth: 2, borderColor: '#fff' }] },
       options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { usePointStyle: true } } } } });
     else ctxM.parentElement.innerHTML = '<div class="empty faint" style="padding-top:40px">Chưa có KPI crew.</div>';
   }

 function renderCrew() {

 function renderKpiTargets() {
   setTitle('Phân bổ KPI chung', 'KPI dựa trên các task daily (Không tính Project)');
   var type = state.period.type, anchor = state.period.anchor;
   var rows = state.members.filter(function(m){return m.active;}).map(function(m) {
     var ts = state.tasks.filter(function(t){return t.assigneeCode === m.code && !t.projectId && !t.crewTask;});
     return { m: m, s: computeStats(ts, type, anchor) };
   }).sort(function(a,b){return b.s.donePts - a.s.donePts;});

   var rowsHtml = rows.map(function (r) {
     var target = parseFloat(state.kpiTargets[r.m.code]) || 0, actual = r.s.donePts;
     var pct = target > 0 ? (actual / target * 100) : 0, pctClass = pct > 100 ? 'kpi-over' : (pct >= 100 ? 'kpi-100' : 'kpi-low');
     return '<tr><td class="mono">' + esc(r.m.code) + '</td><td><b>' + esc(r.m.name) + '</b></td>' +
       '<td><input class="kpi-target-input" type="number" min="0" step="0.5" value="' + esc(target) + '" id="kpi-inp-' + esc(r.m.code) + '"></td>' +
       '<td class="right"><b>' + (Math.round(actual*10)/10) + '</b></td><td class="right kpi-pct ' + pctClass + '">' + (target>0?Math.round(pct)+'%':'—') + (pct>100?' 🏆':'') + '</td>' +
       '<td style="min-width:120px"><div class="kpi-bar"><div class="kpi-bar-fill" style="width:'+Math.min(pct,100)+'%;background:'+(pct>100?'#af52de':(pct>=80?'#34c759':(pct>=50?'#ff9f0a':'#ff3b30')))+'"></div></div></td></tr>';
   }).join('');

   setView('<div class="row row--wrap" style="margin-bottom:24px">' + periodControl() + '</div>' +
     '<div class="demo-hint" style="margin-top:0;margin-bottom:16px;background:rgba(255,255,255,0.4)"><b>Lưu ý:</b> Bảng này chỉ tính KPI các <b>Task daily</b>. Các task thuộc Project có hệ thống đánh giá % đóng góp riêng trong trang chi tiết Project.</div>' +
     '<div class="card stack"><div class="row row--between"><h3>Mục tiêu KPI cá nhân</h3><button class="btn btn--primary btn--sm" id="save-kpi-btn">Lưu mục tiêu</button></div>' +
     '<div class="table-wrap"><table class="kpi-member-table"><thead><tr><th>Mã NV</th><th>Nhân sự</th><th>KPI Mục tiêu</th><th class="right">KPI Đạt được</th><th class="right">Tỷ lệ %</th><th>Tiến độ</th></tr></thead><tbody>' + rowsHtml + '</tbody></table></div></div>');

   var saveBtn = el('save-kpi-btn');
   if (saveBtn) saveBtn.addEventListener('click', function () {
     var targets = {}; rows.forEach(function (r) { var i = el('kpi-inp-' + r.m.code); if (i) targets[r.m.code] = i.value; });
     saveBtn.disabled = true; saveBtn.innerHTML = '<span class="spin"></span>';
     Server.setKpiTarget(state.token, targets).then(refreshState).then(function(){ toast('Đã lưu KPI.', 'ok'); renderKpiTargets(); }).catch(function (e) { saveBtn.disabled=false; saveBtn.textContent='Lưu mục tiêu'; handleErr(e); });
   });
 }

 // Hồ sơ 1 nhân sự + danh sách việc (cá nhân / dự án) kèm tiến độ. Bấm 1 việc -> chi tiết.
 function renderMemberDetail(code) {
   var m = state.members.filter(function (x) { return x.code === code; })[0];
   if (!m) { state.selectedMember = null; return renderMembers(); }
   setTitle('Hồ sơ nhân sự', m.code + ' · ' + (ROLE_LABEL[m.role] || m.role));
   var mine = state.tasks.filter(function (t) { return t.assigneeCode === m.code; });
   var personal = mine.filter(function (t) { return !t.projectId && !t.crewTask; });
   var project = mine.filter(function (t) { return t.projectId; });
   var crew = mine.filter(function (t) { return t.crewTask && !t.projectId; });
   var prog = function (arr) { var d = arr.filter(function (t) { return t.status === STATUS.DONE; }).length; return { d: d, pct: arr.length ? Math.round(d / arr.length * 100) : 0 }; };
   var pAll = prog(mine);
   var canEditThis = isManager(state.user) && m.role !== ROLE.HEAD;
   var head = '<button class="btn btn--ghost btn--sm" data-action="back-members" style="margin-bottom:14px">← Quay lại danh sách nhân sự</button>' +
     '<div class="card stack" style="margin-bottom:6px"><div class="row" style="gap:16px;align-items:center;flex-wrap:wrap">' + avatarHtml(m, 72, null) +
     '<div class="stack" style="gap:4px"><h2>' + esc(m.name) + '</h2><div class="text-sm muted">' + esc(m.title || '') + '</div>' +
     '<span class="role-badge ' + (ROLE_CLASS[m.role] || '') + '" style="align-self:flex-start">' + esc(ROLE_LABEL[m.role] || m.role) + '</span>' +
     (m.active ? '' : ' <span class="tag tag--none">Vô hiệu hóa</span>') + '</div>' +
     '<div class="spacer"></div>' +
     (canEditThis ? '<button class="btn btn--ghost btn--sm" data-action="edit-member" data-code="' + esc(m.code) + '">✏️ Sửa hồ sơ</button>' : '') +
     '<div class="center" style="min-width:110px"><div class="kpi-val" style="font-size:30px">' + pAll.pct + '%</div><div class="kpi-sub">Tiến độ (' + pAll.d + '/' + mine.length + ')</div></div>' +
     '</div></div>';
   var section = function (title, arr) {
     var pr = prog(arr);
     var rows = arr.length ? arr.slice().sort(function (a, b) { return (PRIORITY_RANK[a.priority]||2)-(PRIORITY_RANK[b.priority]||2); }).map(taskRow).join('') : '<div class="empty text-sm" style="padding:14px">Không có.</div>';
     return '<div class="card stack" style="margin-top:14px"><div class="row row--between"><h3>' + title + ' (' + arr.length + ')</h3><span class="faint text-sm">Tiến độ ' + pr.pct + '% · ' + pr.d + ' xong</span></div>' +
       '<div class="kpi-bar"><div class="kpi-bar-fill" style="width:' + pr.pct + '%;background:linear-gradient(90deg,#17479D,#34c759)"></div></div>' +
       '<div class="task-rows">' + rows + '</div></div>';
   };
   var body = section('📋 Công việc cá nhân (daily)', personal) + section('🚀 Công việc dự án', project) + (crew.length ? section('🎬 Công việc Production Crew', crew) : '');
   setView(head + body);
 }

 function openModal(html, lg) {
   var ov = document.createElement('div'); ov.className = 'overlay'; ov.id = 'modal-overlay';
   ov.innerHTML = '<div class="modal' + (lg ? ' modal--lg' : '') + '" role="dialog">' + html + '</div>';
   document.body.appendChild(ov); requestAnimationFrame(function () { ov.classList.add('is-open'); });

   });

   var aiBtn = el('ai-brief-btn');

   $('#create-form').addEventListener('submit', function (ev) {

     var assignee = el('t-assignee-self') ? el('t-assignee-self').value : el('t-assignee').value;
     var base = { description: el('t-desc').value, assigneeCode: assignee, difficulty: el('t-diff').value, priority: el('t-priority').value, deadline: el('t-deadline').value, note: el('t-note')?el('t-note').value:'', projectId: el('t-projId').value || null, crewTask: !!(el('t-crew') && el('t-crew').value), category: (el('t-category')?el('t-category').value:''), phatSinh: !!(el('t-phatsinh') && el('t-phatsinh').checked) };
     var batchName = el('t-batchname') ? el('t-batchname').value.trim() : '';
     var titlesRaw = el('t-batch-titles') ? el('t-batch-titles').value.trim() : '';
     var titles = titlesRaw ? titlesRaw.split('\n').map(function(s){return s.trim();}).filter(Boolean) : [];
     var fail = function(e){ b.disabled=false; b.textContent='Tạo và Giao việc'; handleErr(e); };
     function mk(extra){ var p = {}; for (var k in base) p[k]=base[k]; for (var j in extra) p[j]=extra[j]; return p; }
     if (titles.length) {
       // BATCH: 1 "đầu việc chung" -> N việc con ĐỘC LẬP (mã/trạng thái riêng), cùng nhãn batchName.

 // Đổi ảnh đại diện của CHÍNH MÌNH. Ảnh được nén về tối đa 256px (JPEG ~0.82) ở client để base64 nhỏ.
 var _avatarPending = null; // dataURL đang chờ lưu
 function openAvatarModal() {
   var u = state.user; _avatarPending = null;
   var html = '<div class="modal-head"><h2>🖼️ Thay đổi hình ảnh đại diện</h2><button class="icon-btn" data-action="close-modal">✕</button></div>' +
     '<form id="avatar-form"><div class="modal-body">' +
     '<div class="row" style="gap:18px;align-items:center;flex-wrap:wrap">' +
     '<div id="avatar-preview-wrap">' + avatarHtml(u, 96, null) + '</div>' +
     '<div style="flex:1;min-width:180px">' +
     '<div class="text-sm muted" style="margin-bottom:8px">Chọn ảnh từ thiết bị (JPG/PNG). Ảnh sẽ được thu nhỏ tự động.</div>' +
     '<input id="avatar-file" type="file" accept="image/png,image/jpeg,image/webp">' +
     '</div></div>' +
     '<div id="avatar-msg" class="text-sm" style="margin-top:12px;color:var(--c-danger)"></div>' +
     '</div><div class="modal-foot">' +
     (u.avatar ? '<button type="button" class="btn btn--ghost" id="avatar-remove" style="color:var(--c-danger)">Xoá ảnh hiện tại</button>' : '') +
     '<div class="spacer"></div><button type="button" class="btn btn--ghost" data-action="close-modal">Hủy</button>' +
     '<button type="submit" class="btn btn--primary" id="avatar-go" disabled>Lưu ảnh</button></div></form>';
   openModal(html);

   var fileEl = el('avatar-file'), goEl = el('avatar-go'), msgEl = el('avatar-msg'), prevWrap = el('avatar-preview-wrap');
   fileEl.addEventListener('change', function () {
     msgEl.textContent = '';
     var f = this.files && this.files[0]; if (!f) return;
     if (!/^image\//.test(f.type)) { msgEl.textContent = 'Vui lòng chọn tệp ảnh.'; return; }
     if (f.size > 8 * 1024 * 1024) { msgEl.textContent = 'Ảnh gốc quá lớn (tối đa 8MB).'; return; }
     var reader = new FileReader();
     reader.onload = function (ev) {
       var img = new Image();
       img.onload = function () {
         var max = 256, w = img.width, h = img.height;
         if (w > h) { if (w > max) { h = Math.round(h * max / w); w = max; } }
         else { if (h > max) { w = Math.round(w * max / h); h = max; } }
         var cv = document.createElement('canvas'); cv.width = w; cv.height = h;
         cv.getContext('2d').drawImage(img, 0, 0, w, h);
         var data = cv.toDataURL('image/jpeg', 0.82);
         if (data.length > 200000) data = cv.toDataURL('image/jpeg', 0.6);
         if (data.length > 200000) { msgEl.textContent = 'Ảnh quá lớn sau khi nén. Hãy chọn ảnh khác.'; return; }
         _avatarPending = data;
         prevWrap.innerHTML = avatarHtml({ name: u.name, role: u.role, avatar: data }, 96, null);
         goEl.disabled = false;
       };
       img.onerror = function () { msgEl.textContent = 'Không đọc được ảnh.'; };
       img.src = ev.target.result;
     };
     reader.onerror = function () { msgEl.textContent = 'Không đọc được tệp.'; };
     reader.readAsDataURL(f);
   });

   var rm = el('avatar-remove');
   if (rm) rm.addEventListener('click', function () {
     this.disabled = true; this.innerHTML = '<span class="spin"></span>';
     Server.saveAvatar(state.token, '').then(function (r) { state.user.avatar = ''; return refreshState(); })
       .then(function () { closeModal(); toast('Đã xoá ảnh đại diện.', 'ok'); renderShell(); })
       .catch(function (e) { rm.disabled = false; rm.textContent = 'Xoá ảnh hiện tại'; handleErr(e); });
   });

   $('#avatar-form').addEventListener('submit', function (ev) {
     ev.preventDefault();
     if (!_avatarPending) return;
     var b = el('avatar-go'); b.disabled = true; b.innerHTML = '<span class="spin"></span>';
     Server.saveAvatar(state.token, _avatarPending).then(function (r) { state.user.avatar = r && r.avatar != null ? r.avatar : _avatarPending; return refreshState(); })
       .then(function () { closeModal(); toast('Đã cập nhật ảnh đại diện.', 'ok'); renderShell(); })
       .catch(function (e) { b.disabled = false; b.textContent = 'Lưu ảnh'; handleErr(e); });
   });
 }

   else if (action === 'cal-pick-day') { var _pd = node.getAttribute('data-ymd'); state.calSelectedDay = (state.calSelectedDay === _pd) ? null : _pd; renderPage(); }
   else if (action === 'cal-clear-day') { state.calSelectedDay = null; renderPage(); }
   else if (action === 'cal-toggle') { var _w = node.getAttribute('data-which'); state.calOpen = state.calOpen || {}; state.calOpen[_w] = !state.calOpen[_w]; renderPage(); }
   else if (action === 'summary-jump') { var _sb = el('sum-' + node.getAttribute('data-bucket')); if (_sb) _sb.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
   else if (action === 'team-toggle') { state.teamOpen = state.teamOpen || {}; var _tk = node.getAttribute('data-key'); state.teamOpen[_tk] = !state.teamOpen[_tk]; renderPage(); }
   else if (action === 'scope') { state.scope = node.getAttribute('data-scope'); renderPage(); }
   else if (action === 'work-view') { state.workView = node.getAttribute('data-view'); renderPage(); }
   else if (action === 'work-tab') { state.workTab = node.getAttribute('data-tab'); state.selectedProjectId = null; renderPage(); }
   else if (action === 'crew-work-tab') { state.crewWorkTab = node.getAttribute('data-tab'); state.selectedProjectId = null; renderPage(); }
   else if (action === 'work-period-type') { var _wp = state.workPeriod[node.getAttribute('data-which')]; _wp.type = node.getAttribute('data-type'); _wp.anchor = todayStr(); renderPage(); }
   else if (action === 'work-period-shift') { var _wp2 = state.workPeriod[node.getAttribute('data-which')]; _wp2.anchor = shiftAnchor(_wp2.anchor, _wp2.type, +node.getAttribute('data-delta')); renderPage(); }
   else if (action === 'open-create-crew-proj') openCreateTask(null, true, true);
   else if (action === 'task-start') doTransition(node.getAttribute('data-code'), 'start');
   else if (action === 'task-pause') doTransition(node.getAttribute('data-code'), 'pause');
   else if (action === 'task-resume') doTransition(node.getAttribute('data-code'), 'resume');
   else if (action === 'task-submit') openTaskLink(node.getAttribute('data-code'), 'submit');
   else if (action === 'task-complete') openTaskLink(node.getAttribute('data-code'), 'complete');
   else if (action === 'task-note') openTaskNote(node.getAttribute('data-code'));
   else if (action === 'open-task-detail') openTaskDetail(node.getAttribute('data-code'));
   else if (action === 'task-claim') doTransition(node.getAttribute('data-code'), 'claim');
   else if (action === 'force-status') openForceStatus(node.getAttribute('data-code'));
   else if (action === 'do-force') { var _fc = node.getAttribute('data-code'), _fs = node.getAttribute('data-status'); closeModal(); doTransition(_fc, 'force', _fs); }
   else if (action === 'open-create') openCreateTask(node.getAttribute('data-proj'));
   else if (action === 'open-create-crew') openCreateTask(null, true);
   else if (action === 'crew-tab') { state.crewTab = node.getAttribute('data-tab'); renderPage(); }
   else if (action === 'open-crew-role') openCrewRole();
   else if (action === 'add-crew-member') openAddCrewMember();
   else if (action === 'edit-crew-member') openEditCrewMember(node.getAttribute('data-code'));
   else if (action === 'view-member') { state.selectedMember = node.getAttribute('data-code'); renderPage(); }
   else if (action === 'back-members') { state.selectedMember = null; renderPage(); }
   else if (action === 'open-member') openMember(null);
   else if (action === 'edit-member') openMember(node.getAttribute('data-code'));
   else if (action === 'delete-member') doDeleteMember(node.getAttribute('data-code'));
   else if (action === 'toggle-grant') {
     var gcode = node.getAttribute('data-code'), gkey = node.getAttribute('data-key'), gval = node.checked;
     Server.setGrant(state.token, gcode, gkey, gval).then(refreshState).then(function(){ toast(gval ? 'Đã giao quyền.' : 'Đã thu hồi quyền.', 'ok'); renderPage(); }).catch(function(e){ handleErr(e); renderPage(); });
   }
   else if (action === 'open-avatar') openAvatarModal();
   else if (action === 'close-modal') closeModal();
   else if (action === 'view-project') { state.page = 'work'; state.workTab = 'projects'; state.selectedProjectId = node.getAttribute('data-id'); renderPage(); }
   else if (action === 'open-create-project') openProjectForm(null);
   else if (action === 'task-menu') { e.stopPropagation(); toggleKebab(node); }
   else if (action === 'project-menu') { e.stopPropagation(); toggleKebab(node); }
   else if (action === 'edit-task') { e.stopPropagation(); openEditTask(node.getAttribute('data-code')); }
   else if (action === 'delete-task') { e.stopPropagation(); doDeleteTask(node.getAttribute('data-code')); }
   else if (action === 'edit-project') { e.stopPropagation(); openProjectForm(node.getAttribute('data-id')); }
   else if (action === 'delete-project') { e.stopPropagation(); doDeleteProject(node.getAttribute('data-id')); }
   else if (action === 'complete-project') {
     if(confirm('Bạn có chắc chắn muốn hoàn thành dự án này? Các task chưa xong vẫn sẽ giữ nguyên trạng thái.')){
       Server.completeProject(state.token, node.getAttribute('data-id')).then(refreshState).then(function(){ toast('Đã hoàn thành Dự án!', 'ok'); renderPage(); }).catch(handleErr);
     }
   }
   else if (action === 'export-xlsx') exportToExcel();
 });

 function toggleKebab(btn) {
   var menu = btn.parentElement.querySelector('.kebab-menu'); if (!menu) return;
   var wasOpen = menu.classList.contains('open');
   Array.prototype.forEach.call(document.querySelectorAll('.kebab-menu.open'), function (m) { m.classList.remove('open'); });
   if (!wasOpen) menu.classList.add('open');
 }
 function doDeleteTask(code) {
   var t = state.tasks.filter(function (x) { return x.taskCode === code; })[0];
   if (!confirm('Xoá task "' + (t ? t.title : code) + '"?\nMã: ' + code + '\nHành động KHÔNG thể hoàn tác.')) return;
   Server.deleteTask(state.token, code).then(refreshState).then(function () { toast('Đã xoá task.', 'ok'); renderPage(); }).catch(handleErr);
 }
 function doDeleteProject(id) {
   var p = state.projects.filter(function (x) { return x.id === id; })[0];
   var n = state.tasks.filter(function (t) { return t.projectId === id; }).length;
   if (!confirm('Xoá dự án "' + (p ? p.name : id) + '"?\nSẽ xoá luôn ' + n + ' task thuộc dự án này. KHÔNG thể hoàn tác.')) return;
   Server.deleteProject(state.token, id).then(refreshState).then(function () { state.selectedProjectId = null; state.page = 'work'; state.workTab = 'projects'; toast('Đã xoá dự án.', 'ok'); renderPage(); }).catch(handleErr);
 }

 function doTransition(code, act, link) {
   Server.transitionTask(state.token, code, act, link||'')
     .then(function(t) { return refreshState().then(() => t); })
     .then(function(t) {
       // Yêu cầu: Thông báo khi hoàn thành task đúng format
       if (act === 'complete') {
         toast('đã hoàn thành task-' + t.title + '-' + t.taskCode, 'ok');
       } else {
         var msg = { start:'Bắt đầu làm việc', pause:'Đã tạm hoãn', resume:'Tiếp tục làm việc', submit:'Đã gửi draft', claim:'🙋 Đã nhận việc — chúc bạn hoàn thành tốt!', force:'⚙️ Đã đổi trạng thái công việc' };
         toast(msg[act] || 'Cập nhật thành công', 'ok');
       }
       renderPage(); 
     }).catch(handleErr);
 }

 function bootThenRender() { Server.bootstrap().then(function(b){state.boot=b;}).catch(function(){}).then(renderRoot); }
 function init() {
   // Khôi phục phiên: ưu tiên localStorage (ghi nhớ); nếu không có thì sessionStorage (chỉ trong phiên tab).
   try {
     var rawL = localStorage.getItem(SESS_KEY), rawS = sessionStorage.getItem(SESS_KEY);
     _rememberSession = !!rawL;
     var s = JSON.parse(rawL || rawS || 'null');
     if (s && s.token) { state.token = s.token; state.user = s.user; }
   } catch(e){}
   if (state.token) { state._notifyArmed = false; Promise.all([Server.bootstrap().then(function(b){state.boot=b;}).catch(function(){}), refreshState()]).then(function(){ state.scope=isManager(state.user)?'overview':'me'; startPolling(); renderRoot(); }).catch(function(e){ var msg=(e&&e.message)?e.message:String(e); clearSession(); bootThenRender(); if(/SESSION_KICKED/.test(msg)) setTimeout(function(){ toast('Tài khoản đang được sử dụng ở nơi khác.', 'err'); }, 400); }); }
   else { bootThenRender(); }
 }
 init();
})();
 </script>
