 var IS_GAS = (typeof google !== 'undefined' && google.script && google.script.run);
 function gasRun(fn) {
   var args = Array.prototype.slice.call(arguments, 1);
   return new Promise(function (resolve, reject) {
     // QUAN TRỌNG: gọi method TRÊN chính runner (this = runner) để giữ success/failure handler.
     // Dùng .apply(null, ...) sẽ mất handler → promise treo mãi → kẹt màn hình "Đang tải".
     var runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
     runner[fn].apply(runner, args);
   });
 }
 async function callGemini(prompt) {
   // Trên GAS: gọi proxy server-side (API key nằm trong Script Properties, không lộ ra client).
   if (IS_GAS) return gasRun('aiGenerate', state.token, prompt);
   if (!apiKey) throw new Error('Tính năng AI chưa được cấu hình (thiếu API key).');
   const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=' + apiKey;
   const payload = { contents: [{ parts: [{ text: prompt }] }] };
   let retries = 3; let delay = 800;
   while (retries > 0) {
     try {
       const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
       if (!response.ok) throw new Error('HTTP error! status: ' + response.status);
       const data = await response.json();
       var text = data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text;
       if (!text) throw new Error('AI không trả về nội dung.');
       return text;
     } catch (e) {
       retries--; if (retries === 0) throw e;
       await new Promise(r => setTimeout(r, delay)); delay *= 2;
     }
   }
 }

 function ymd(iso) { return iso ? String(iso).substring(0, 10) : ''; }
 function todayStr() { var d = new Date(); return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
 function parseYmd(s) { var p = String(s).split('-'); return new Date(+p[0], +p[1] - 1, +p[2], 12, 0, 0); }
 function instant(iso) { var t = Date.parse(iso); return isNaN(t) ? null : t; }

 function getLocalIso() {

 }

 function isoWeek(dObj) {
   var t = new Date(Date.UTC(dObj.getFullYear(), dObj.getMonth(), dObj.getDate()));
   var day = (t.getUTCDay() + 6) % 7; t.setUTCDate(t.getUTCDate() - day + 3);
   var isoYear = t.getUTCFullYear();
   var week1 = new Date(Date.UTC(isoYear, 0, 4));
   var wk = 1 + Math.round(((t - week1) / 86400000 - 3 + ((week1.getUTCDay() + 6) % 7)) / 7);
   return { year: isoYear, week: wk, code: isoYear + '-W' + pad2(wk) };
 }
 function mondayOf(dObj) { var x = new Date(dObj); var day = (x.getDay() + 6) % 7; x.setDate(x.getDate() - day); return x; }
 function periodCode(ymdStr, type) {
   var d = parseYmd(ymdStr);
   if (type === 'week') return isoWeek(d).code;
   if (type === 'year') return '' + d.getFullYear();
   return d.getFullYear() + '-' + pad2(d.getMonth() + 1);
 }
 function periodKeyOf(iso, type) { return iso ? periodCode(ymd(iso), type) : null; }
 function periodLabel(anchorYmd, type) {
   var d = parseYmd(anchorYmd);
   if (type === 'week') {
     var w = isoWeek(d), mon = mondayOf(d), sun = new Date(mon); sun.setDate(sun.getDate() + 6);
     var f = function (x) { return pad2(x.getDate()) + '/' + pad2(x.getMonth() + 1); };
     return 'Tuần ' + w.week + ' · ' + f(mon) + '–' + f(sun) + '/' + w.year;
   }
   if (type === 'year') return 'Năm ' + d.getFullYear();
   return 'Tháng ' + pad2(d.getMonth() + 1) + '/' + d.getFullYear();
 }
 function shiftAnchor(anchorYmd, type, delta) {
   var d = parseYmd(anchorYmd);
   if (type === 'week') d.setDate(d.getDate() + 7 * delta);
   else if (type === 'year') d.setFullYear(d.getFullYear() + delta);
   else d.setMonth(d.getMonth() + delta);
   return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
 }
 function classifyDeadline(t) {
   if (!t.deadline) return 'none';
   if (t.status !== STATUS.DONE) return (todayStr() > t.deadline) ? 'overdue' : 'open';
   var c = ymd(t.completedAt); if (!c) return 'open';
   if (c < t.deadline) return 'som';
   if (c === t.deadline) return 'dung';
   return 'tre';
 }
 function avg(arr) { return arr.length ? arr.reduce(function (s, x) { return s + x; }, 0) / arr.length : null; }

 function computeStats(tasks, type, anchorYmd) {
   var pk = periodCode(anchorYmd, type);
   var assigned = tasks.filter(function (t) { return periodKeyOf(t.createdAt, type) === pk; });
   var doneInP = tasks.filter(function (t) { return t.status === STATUS.DONE && t.completedAt && periodKeyOf(t.completedAt, type) === pk; });
   var assignedPts = assigned.reduce(function (s, t) { return s + effectiveKpi(t); }, 0);
   var donePts = doneInP.reduce(function (s, t) { return s + effectiveKpi(t); }, 0);
   var cyc = [], lead = [], pauseT = [];
   doneInP.forEach(function (t) {
     var ci = instant(t.completedAt);
     if (ci && instant(t.startedAt)) cyc.push(Math.max(0, (ci - instant(t.startedAt)) / 3600000));
     if (ci && instant(t.createdAt)) lead.push(Math.max(0, (ci - instant(t.createdAt)) / 3600000));
     if (t.pauseHours != null) pauseT.push(t.pauseHours);
   });
   var punc = { som: 0, dung: 0, tre: 0 };
   doneInP.forEach(function (t) { var c = classifyDeadline(t); if (punc[c] != null) punc[c]++; });
   var byDiff = {}; DIFF_ORDER.forEach(function (d) { byDiff[d] = 0; });
   assigned.forEach(function (t) { if (byDiff[t.difficulty] != null) byDiff[t.difficulty]++; });
   var byStatus = {}; STATUS_ORDER.forEach(function (s) { byStatus[s] = 0; });
   tasks.forEach(function (t) { if (byStatus[t.status] != null) byStatus[t.status]++; });
   var overdueOpen = tasks.filter(function (t) { return t.status !== STATUS.DONE && t.deadline && todayStr() > t.deadline; }).length;
   var links = doneInP.filter(function (t) { return t.reportLink; }).sort(function (a, b) { return (b.completedAt || '').localeCompare(a.completedAt || ''); });
   var completedOfAssigned = assigned.filter(function (t) { return t.status === STATUS.DONE; }).length;
   var taskCompletionRate = assigned.length > 0 ? (completedOfAssigned / assigned.length * 100) : 0;
   
   return {
     periodKey: pk, assignedCount: assigned.length, doneCount: doneInP.length,
     assignedPts: assignedPts, donePts: donePts,
     taskCompletionRate: taskCompletionRate, totalInP: assigned.length, completedInP: completedOfAssigned,
     avgCycleH: avg(cyc), avgLeadH: avg(lead), avgPauseH: avg(pauseT),
     punc: punc, byDiff: byDiff, byStatus: byStatus, overdueOpen: overdueOpen, totalTasks: tasks.length, links: links
   };
 }

 // ================== LỊCH CÁ NHÂN ==================
 var CAL_DOW = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
 function fmtYmd(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
 function calChip(t) {
   return '<div class="cal-chip ' + (STATUS_CLASS[t.status] || '') + '" data-action="task-note" data-code="' + esc(t.taskCode) + '" title="' + esc(t.title) + ' — ' + esc(t.status) + '">' + esc(t.title) + '</div>';
 }
 function renderCalendar() {
   var p = state.period;
   setTitle('📅 Lịch cá nhân', 'Công việc của bạn theo HẠN CHÓT (deadline) — xem theo Tuần / Tháng / Năm');
   // Chỉ việc của CHÍNH MÌNH.
   var mine = state.tasks.filter(function (t) { return t.assigneeCode === state.user.code; });
   var dayMap = {}, monthCount = {}, withDl = 0;
   mine.forEach(function (t) {
     var dl = ymd(t.deadline);
     if (!dl) return;
     withDl++;
     (dayMap[dl] = dayMap[dl] || []).push(t);
     var mk = dl.substring(0, 7); monthCount[mk] = (monthCount[mk] || 0) + 1;
   });
   var today = todayStr();
   var grid = '';

   if (p.type === 'week') {
     var mon = mondayOf(parseYmd(p.anchor));
     var cols = '';
     for (var i = 0; i < 7; i++) {
       var d = new Date(mon); d.setDate(mon.getDate() + i);
       var key = fmtYmd(d), isToday = (key === today), dts = dayMap[key] || [];
       cols += '<div class="cal-week-col' + (isToday ? ' cal-cell--today' : '') + '">' +
         '<div class="cal-col-head">' + CAL_DOW[i] + ' · ' + pad2(d.getDate()) + '/' + pad2(d.getMonth() + 1) + (isToday ? ' <span class="cal-today-dot">hôm nay</span>' : '') + '</div>' +
         (dts.length ? dts.map(calChip).join('') : '<div class="cal-empty">—</div>') + '</div>';
     }
     grid = '<div class="cal-grid cal-grid--week">' + cols + '</div>';

   } else if (p.type === 'year') {
     var yr = parseYmd(p.anchor).getFullYear();
     var cards = '';
     for (var mo = 0; mo < 12; mo++) {
       var ym = yr + '-' + pad2(mo + 1), cnt = monthCount[ym] || 0;
       cards += '<div class="cal-month-card' + (cnt ? ' has-tasks' : '') + '" data-action="cal-month" data-ym="' + ym + '">' +
         '<div class="mc-name">Tháng ' + (mo + 1) + '</div><div class="mc-count">' + cnt + '</div><div class="mc-sub">công việc</div></div>';
     }
     grid = '<div class="cal-year">' + cards + '</div>';

   } else { // month
     var anchorD = parseYmd(p.anchor), year = anchorD.getFullYear(), month = anchorD.getMonth();
     var first = new Date(year, month, 1);
     var firstOffset = (first.getDay() + 6) % 7;
     var daysInMonth = new Date(year, month + 1, 0).getDate();
     var weeks = Math.ceil((firstOffset + daysInMonth) / 7);
     var gridStart = mondayOf(first);
     var head = CAL_DOW.map(function (s) { return '<div class="cal-dow">' + s + '</div>'; }).join('');
     var cells = '';
     for (var k = 0; k < weeks * 7; k++) {
       var dd = new Date(gridStart); dd.setDate(gridStart.getDate() + k);
       var ckey = fmtYmd(dd), out = (dd.getMonth() !== month), isT = (ckey === today), cts = dayMap[ckey] || [];
       var chips = cts.slice(0, 3).map(calChip).join('') +
         (cts.length > 3 ? '<div class="cal-more" data-action="cal-day" data-ymd="' + ckey + '">+' + (cts.length - 3) + ' nữa…</div>' : '');
       cells += '<div class="cal-cell' + (out ? ' cal-cell--out' : '') + (isT ? ' cal-cell--today' : '') + '">' +
         '<div class="cal-daynum">' + dd.getDate() + '</div>' + chips + '</div>';
     }
     grid = '<div class="cal-grid cal-grid--month">' + head + cells + '</div>';
   }

   // Khay việc CHƯA CÓ HẠN (không lên lịch được) — chỉ ở Tuần/Tháng.
   var tray = '';
   if (p.type !== 'year') {
     var noDl = mine.filter(function (t) { return !ymd(t.deadline); });
     if (noDl.length) {
       tray = '<div class="card" style="margin-top:18px;padding:14px 16px;background:rgba(255,255,255,0.4)">' +
         '<div class="text-sm muted" style="margin-bottom:8px">🕓 Chưa đặt hạn (' + noDl.length + ') — không hiển thị trên lịch</div>' +
         '<div class="row row--wrap" style="gap:6px">' +
         noDl.map(function (t) { return '<span class="cal-chip ' + (STATUS_CLASS[t.status] || '') + '" data-action="task-note" data-code="' + esc(t.taskCode) + '" style="display:inline-block;max-width:220px">' + esc(t.title) + '</span>'; }).join('') +
         '</div></div>';
     }
   }

   var legend = '<div class="cal-legend">' +
     [['pill--todo', 'Chưa bắt đầu'], ['pill--run', 'Đang chạy'], ['pill--pending', 'Tạm dừng'], ['pill--sent', 'Đã gửi'], ['pill--done', 'Hoàn thành']]
       .map(function (s) { return '<span class="cal-leg ' + s[0] + '"><span class="cal-leg-dot"></span>' + s[1] + '</span>'; }).join('') + '</div>';

   var bar = '<div class="card" style="padding:16px 20px;margin-bottom:18px;background:rgba(255,255,255,0.4)">' +
     '<div class="row row--between row--wrap" style="gap:12px">' + periodControl() +
     '<div class="faint text-sm">' + withDl + ' việc có hạn · ' + esc(periodLabel(p.anchor, p.type)) + '</div></div>' +
     legend + '</div>';

   setView(bar + grid + tray);
 }

 // ================== DASHBOARD ==================
 function drawCharts(stats, mgrView) {
   if (chartInstances.dept) { chartInstances.dept.destroy(); chartInstances.dept = null; }
   if (chartInstances.member) { chartInstances.member.destroy(); chartInstances.member = null; }
   Chart.defaults.font.family = "'Inter', -apple-system, sans-serif";
   Chart.defaults.color = "#86868b";

   var ctxDept = el('deptTaskChart');
   if (ctxDept) {
     var done = stats.completedInP, rem = Math.max(0, stats.totalInP - done);
     chartInstances.dept = new Chart(ctxDept, {
       type: 'doughnut',
       data: {
         labels: ['Hoàn thành', 'Chưa hoàn thành'],
         datasets: [{ data: [done, rem], backgroundColor: ['#34c759', 'rgba(0,0,0,0.05)'], hoverBackgroundColor: ['#2ebd4e', 'rgba(0,0,0,0.1)'], borderWidth: 0 }]
       },
       options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { usePointStyle: true } } } }
     });
   }
   var ctxMember = el('memberKpiChart');
   if (ctxMember && mgrView) {
     var rows = state.members.filter(function(m){return m.active;}).map(function(m) {
       var s = computeStats(state.tasks.filter(function(t){return t.assigneeCode===m.code && !t.projectId && !t.crewTask;}), state.period.type, state.period.anchor); return {m:m, s:s};
     }).sort(function(a,b){return b.s.donePts - a.s.donePts;});
     
     var labels = [], data = [], colors = ['rgba(238, 104, 35,0.85)', 'rgba(23, 71, 157,0.85)', 'rgba(52,199,89,0.85)', 'rgba(255,159,10,0.85)', 'rgba(175,82,222,0.85)'];
     rows.forEach(function (r) { if (r.s.donePts > 0) { labels.push(r.m.name); data.push(r.s.donePts); } });
     if (data.length > 0) {
       chartInstances.member = new Chart(ctxMember, {
         type: 'pie', data: { labels: labels, datasets: [{ data: data, backgroundColor: data.map(function (_, i) { return colors[i % colors.length]; }), borderWidth: 2, borderColor: '#ffffff' }] },
         options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { usePointStyle: true } } } }
       });
     } else { ctxMember.parentElement.innerHTML = '<div class="empty faint" style="padding-top:40px">Chưa có KPI.</div>'; }
   }
 }

 function renderDashboard() {
   var u = state.user, mgr = isManager(u);
   setTitle('Bảng điều khiển', 'Thống kê các công việc (Không bao gồm task trong Project)');

     scopeCtl = '<div class="seg" style="margin-left:auto"><button data-action="scope" data-scope="overview"' + (state.scope === 'overview' ? ' class="is-active"' : '') + '>Toàn phòng</button><button data-action="scope" data-scope="me"' + (state.scope === 'me' ? ' class="is-active"' : '') + '>Của tôi</button></div>';
   }

   // Độc lập KPI: Lọc bỏ các task có projectId

     return !t.projectId && !t.crewTask && (mgr && state.scope === 'overview' ? true : t.assigneeCode === u.code);

   var s = computeStats(tasksForStats, state.period.type, state.period.anchor);

     '<div class="card kpi"><div class="kpi-top"><div class="kpi-icon ico-green"><span class="glyph">⏱️</span></div></div><div class="kpi-val">' + fmtH(s.avgCycleH) + '</div><div class="kpi-sub">T/g làm TB (Start → Done)</div></div>' +

     '<div class="card kpi"><div class="kpi-top"><div class="kpi-icon ico-blue"><span class="glyph">✨</span></div></div><div class="kpi-val">' + (Math.round(s.donePts*10)/10) + '</div><div class="kpi-sub">Điểm KPI HT (Task daily)</div></div>';

   var deptInner = s.totalInP === 0
     ? '<div class="empty"><div class="big">🗂️</div><p>Chưa có task daily nào trong kỳ này.</p></div>'
     : '<div class="chart-container"><canvas id="deptTaskChart"></canvas></div>';
   var chartsHtml = '<div class="card stack"><h3>Tỉ lệ hoàn thành task daily (' + pctStr + ')</h3>' + deptInner + '</div>';
   if (mgr && state.scope === 'overview') chartsHtml += '<div class="card stack"><h3>Tỉ trọng đóng góp KPI (Task daily)</h3><div class="chart-container"><canvas id="memberKpiChart"></canvas></div></div>';

   setView('<div class="row row--wrap" style="margin-bottom:24px">' + periodControl() + scopeCtl + exportBtn + '</div>' +
     '<div class="grid-cards" style="margin-bottom:24px">' + cards + '</div>' +
     '<div class="grid-dashboard"><div class="stack">' + chartsHtml + '</div><div class="stack">' + renderRecentTasks(tasksForStats) + '</div></div>');
   requestAnimationFrame(function () { drawCharts(s, (mgr && state.scope === 'overview')); });
 }

 function renderRecentTasks(tasks) {
   var recent = tasks.slice().sort(function (a, b) { return (b.createdAt || '').localeCompare(a.createdAt || ''); }).slice(0, 5);

       '<span class="pill ' + STATUS_CLASS[t.status] + '"><span class="dot"></span>' + esc(t.status) + '</span></div>';

 // ================== PROJECTS ==================
 function renderProjects() {
   setTitle('Quản lý Dự án', 'Liệt kê các sự kiện, chiến dịch hoặc project đang chạy');
   var mgr = isManager(state.user);
   var html = '<div class="row row--between" style="margin-bottom:24px">' +
     '<div class="faint text-sm">Có ' + state.projects.length + ' dự án</div>' +
     (mgr ? '<button class="btn btn--primary" data-action="open-create-project">+ Tạo Dự án mới</button>' : '') + '</div>';
   
   if (!state.projects.length) {
     html += '<div class="card empty"><div class="big">🚀</div><p>Chưa có dự án nào được tạo.</p></div>';
   } else {
     var grid = state.projects.map(function(p) {
       var pTasks = state.tasks.filter(function(t){return t.projectId === p.id;});
       var doneTasks = pTasks.filter(function(t){return t.status === STATUS.DONE;});
       var pct = pTasks.length > 0 ? Math.round((doneTasks.length / pTasks.length) * 100) : 0;
       
       // Nút 3 chấm chỉnh sửa dự án (được làm nổi bật và chuẩn phong cách Liquid Glass)
       var editBtn = mgr ? kebabMenu({ menuAction: 'project-menu', entries: [
           { action: 'edit-project', id: p.id, code: '', label: '✏️ Sửa dự án' },
           { action: 'delete-project', id: p.id, code: '', label: '🗑️ Xoá dự án', danger: true }
         ] }) : '';

       return '<div class="card stack" style="cursor:pointer; transition: transform 0.2s; border-top: 4px solid '+ (p.status===PROJ_STATUS.COMPLETED?'var(--c-success)':'var(--c-project)') +'" data-action="view-project" data-id="'+esc(p.id)+'" onmouseover="this.style.transform=\'scale(1.02)\'" onmouseout="this.style.transform=\'none\'">' +
         '<div class="row row--between"><span class="tag tag--project mono text-xs">' + esc(p.id) + '</span>' + 
         '<div class="row" style="gap:4px">' + (p.status === PROJ_STATUS.COMPLETED ? '<span class="pill pill--done"><span class="dot"></span>Hoàn thành</span>' : '<span class="pill" style="background:rgba(175,82,222,0.1);color:#af52de"><span class="dot"></span>Đang chạy</span>') + editBtn + '</div></div>' +
         '<h3 style="font-size:20px; margin:4px 0">' + esc(p.name) + '</h3>' +
         '<div class="text-sm muted">Lead: <b>' + esc(memberName(p.leadCode)) + '</b></div>' +
         '<div class="text-sm muted">Sự kiện/Shooting: <b>' + (p.eventDate ? fmtDateVN(p.eventDate) : '—') + '</b></div>' +
         '<div class="proj-progress"><div class="fill" style="width:'+pct+'%; background:'+(p.status===PROJ_STATUS.COMPLETED?'#34c759':'linear-gradient(90deg, #af52de, #5ac8fa)')+'"></div></div>' +
         '<div class="row row--between text-xs faint"><span>Hoàn thành '+pct+'%</span><span>'+doneTasks.length+'/'+pTasks.length+' task</span></div>' +
         '</div>';
     }).join('');
     html += '<div class="grid-cards">' + grid + '</div>';
   }
   setView(html);
 }

 function renderProjectDetail(id) {
   var p = state.projects.filter(function(x){return x.id === id;})[0];
   if (!p) { state.selectedProjectId = null; return renderProjects(); }
   var mgr = isManager(state.user);
   // Chuyên viên là Lead/thành viên của dự án này cũng được TỰ thêm việc cho mình vào dự án.
   var meCode = state.user.code;
   var isPrjMember = (p.leadCode === meCode) || (p.memberCodes || []).indexOf(meCode) >= 0;
   var canAddTask = (mgr || (deptScopeOf(state.user.role) === 'own' && isPrjMember)) && p.status !== PROJ_STATUS.COMPLETED;

   setTitle('Dự án: ' + p.name, p.id + ' • Lead: ' + memberName(p.leadCode));
   
   var pTasks = state.tasks.filter(function(t){return t.projectId === p.id;});
   var doneTasks = pTasks.filter(function(t){return t.status === STATUS.DONE;});
   var totalT = pTasks.length;
   var doneT = doneTasks.length;
   var pct = totalT > 0 ? Math.round((doneT / totalT) * 100) : 0;
   
   // Lọc những ai đang thực hiện task (RUNNING)
   var runningCodes = [];
   pTasks.forEach(function(t){ if(t.status === STATUS.RUNNING && canSeeMember(t.assigneeCode) && !runningCodes.includes(t.assigneeCode)) runningCodes.push(t.assigneeCode); });
   
   var html = '<button class="btn btn--ghost btn--sm" data-action="nav" data-page="projects" style="margin-bottom:16px">← Quay lại danh sách dự án</button>';
   
   // Top Stats
   var headerBtns = '';
   if (mgr && p.status !== PROJ_STATUS.COMPLETED) {
     headerBtns = '<div class="row row--wrap"><button class="btn btn--ghost btn--sm" data-action="edit-project" data-id="'+esc(p.id)+'">✏️ Sửa</button><button class="btn btn--success btn--sm" data-action="complete-project" data-id="'+esc(p.id)+'">Đánh dấu Hoàn thành</button><button class="btn btn--ghost btn--sm" data-action="delete-project" data-id="'+esc(p.id)+'" style="color:var(--c-danger)">🗑️ Xoá dự án</button></div>';
   }

   html += '<div class="card stack" style="margin-bottom:24px; background:rgba(175,82,222,0.05); border:1px solid rgba(175,82,222,0.2)">' +
     '<div class="row row--between row--wrap"><div class="stack" style="gap:4px">' +
     '<h2 style="color:var(--c-project)">' + esc(p.name) + '</h2>' +
     '<div class="text-sm">Ngày sự kiện / Shooting: <b>' + (p.eventDate ? fmtDateVN(p.eventDate) : '—') + '</b></div>' +
     '</div>' + headerBtns + '</div>' +
     
     '<div class="proj-progress" style="height:16px; border-radius:10px"><div class="fill" style="width:'+pct+'%; border-radius:10px; background:'+(p.status===PROJ_STATUS.COMPLETED?'#34c759':'linear-gradient(90deg, #af52de, #5ac8fa)')+'"></div></div>' +
     '<div class="row row--between text-sm"><b>Tiến độ: '+pct+'%</b><b>Đã xong '+doneT+' / Tổng '+totalT+' task</b></div>' +
     
     (runningCodes.length ? '<div style="margin-top:12px; font-size:14px">⚡ <b>Đang trực tiếp xử lý:</b> ' + runningCodes.map(function(c){return '<span class="tag" style="background:rgba(23, 71, 157,0.15); color:var(--c-secondary-active)">'+esc(memberName(c))+'</span>';}).join(' ') + '</div>' : '') +
     '</div>';

   // Tách 2 cột: Task List & Project KPI
   html += '<div class="grid-dashboard">';
   
   // Bảng Liệt kê chi tiết phân công
   var taskHtml = '<div class="card stack"><div class="row row--between"><h3>Bảng phân công chi tiết</h3>' +
     (canAddTask ? '<button class="btn btn--primary btn--sm" data-action="open-create" data-proj="'+esc(p.id)+'">+ ' + (mgr ? 'Giao task vào dự án' : 'Thêm việc của tôi') + '</button>' : '') + '</div>';
   
   if (!pTasks.length) taskHtml += '<div class="empty text-sm">Chưa có task nào trong dự án này.</div>';
   else taskHtml += '<div class="task-list">' + pTasks.sort(function(a,b){ return (PRIORITY_RANK[a.priority]||2)-(PRIORITY_RANK[b.priority]||2); }).map(taskCard).join('') + '</div>';
   taskHtml += '</div>';
   html += taskHtml;

   // Thống kê & KPI Độc lập của Project
   var membersKpiHtml = '';
   if (totalT === 0) {
     membersKpiHtml = '<tr><td colspan="4" class="center muted text-sm">Chưa có số liệu.</td></tr>';
   } else {
     var memberStats = {};
     // CHỈ thống kê những thành viên viewer được phép thấy (ẩn người cấp cao / khác silo).
     p.memberCodes.forEach(function(c){ if (canSeeMember(c)) memberStats[c] = { assigned:0, done:0 }; });
     pTasks.forEach(function(t) {
       if(!canSeeMember(t.assigneeCode)) return;
       if(!memberStats[t.assigneeCode]) memberStats[t.assigneeCode] = {assigned:0, done:0};
       memberStats[t.assigneeCode].assigned++;
       if(t.status === STATUS.DONE) memberStats[t.assigneeCode].done++;
     });
     
     membersKpiHtml = Object.keys(memberStats).map(function(c) {
       var ms = memberStats[c];
       var kpiPct = Math.round((ms.done / totalT) * 100);
       return '<tr><td><b>' + esc(memberName(c)) + '</b></td>' +
         '<td class="center">' + ms.assigned + '</td><td class="center">' + ms.done + '</td>' +
         '<td class="right"><b style="color:var(--c-project)">' + kpiPct + '%</b></td></tr>';
     }).join('');
   }

   html += '<div class="card stack"><h3>Hệ thống KPI Độc lập Dự án</h3>' +
     '<p class="text-sm muted">Chỉ tính phần công việc của mỗi chuyên viên dựa trên tổng số task dự án đang có.</p>' +
     '<div class="table-wrap"><table><thead><tr><th>Chuyên viên</th><th class="center">Việc giao</th><th class="center">Hoàn thành</th><th class="right">% / Tổng dự án</th></tr></thead><tbody>' +
     membersKpiHtml +
     '</tbody></table></div></div>';

   html += '</div>';
   setView(html);
 }

 // ================== TASKS & NOTES ==================
 function taskActions(t) {
   // CHỈ chính người được giao việc mới thao tác được (bắt đầu/tạm hoãn/.../ghi chú).
   // Trưởng/Phó phòng hay bất kỳ ai khác KHÔNG có quyền thao tác trên task của người khác.
   var u = state.user; if (t.assigneeCode !== u.code) return '';
   var btns = [];
   if (t.status === STATUS.TODO) btns.push('<button class="btn btn--secondary btn--sm" data-action="task-start" data-code="' + esc(t.taskCode) + '">Bắt đầu</button>');
   else if (t.status === STATUS.RUNNING) {
     btns.push('<button class="btn btn--ghost btn--sm" data-action="task-pause" data-code="' + esc(t.taskCode) + '">Tạm hoãn</button>');
     btns.push('<button class="btn btn--primary btn--sm" data-action="task-submit" data-code="' + esc(t.taskCode) + '">Gửi báo cáo</button>');
   } else if (t.status === STATUS.PENDING) btns.push('<button class="btn btn--secondary btn--sm" data-action="task-resume" data-code="' + esc(t.taskCode) + '">Tiếp tục</button>');
   else if (t.status === STATUS.SENT) btns.push('<button class="btn btn--success btn--sm" data-action="task-complete" data-code="' + esc(t.taskCode) + '">Xác nhận HT</button>');
   
   btns.push('<button class="btn btn--ghost btn--sm" data-action="task-note" data-code="' + esc(t.taskCode) + '">📝 Ghi chú</button>');
   return btns.join('');
 }
 
 function taskCard(t) {
   var kpiBadge = kpiMultiplier(t) > 1 ? '<span class="tag" style="background:rgba(175,82,222,0.15);color:#8a2be2;font-weight:700" title="Khẩn cấp + Nâng cao/Khó = x1.5">×1.5 KPI</span>' : '';
   var noteHtml = t.note ? '<div class="task-note"><b>📝 Ghi chú:</b><br>' + esc(t.note).replace(/\n/g, '<br>') + '</div>' : '';
   var projBadge = t.projectId ? '<span class="tag tag--project text-xs" style="margin-left:8px">🚀 Project</span>' : '';
   var crewBadge = t.crewTask ? '<span class="tag text-xs" style="margin-left:8px;background:rgba(255,45,85,0.12);color:#ff2d55;border-color:rgba(255,45,85,0.3)">🎬 Crew</span>' : '';
   var kebab = canManageTask(t) ? kebabMenu({ menuAction: 'task-menu', entries: [
       { action: 'edit-task', code: t.taskCode, label: '✏️ Sửa task' },
       { action: 'delete-task', code: t.taskCode, label: '🗑️ Xoá task', danger: true }
     ] }) : '';

   return '<div class="card task-card"><div class="task-head"><div><div class="task-code mono">' + esc(t.taskCode) + projBadge + crewBadge + '</div><div class="task-title">' + esc(t.title) + '</div></div>' +
     '<div class="row" style="gap:6px;align-items:flex-start"><span class="pill ' + STATUS_CLASS[t.status] + '"><span class="dot"></span>' + esc(t.status) + '</span>' + kebab + '</div></div>' +
     (t.description ? '<div class="text-sm muted" style="margin-top:-6px">' + esc(t.description) + '</div>' : '') +
     '<div class="task-meta"><span class="diff ' + DIFF_CLASS[t.difficulty] + '">' + esc(t.difficulty) + ' · ' + t.kpiPoint + ' KPI</span>' + kpiBadge +
     '<span class="tag">👤 ' + esc(memberName(t.assigneeCode)) + '</span>' + 
     (t.priority !== 'Bình thường' ? '<span class="pri ' + (PRIORITY_CLASS[t.priority]||'') + '">' + esc(t.priority) + '</span>' : '') + '</div>' +
     noteHtml +
     '<div class="steps">' + STATUS_ORDER.map(function(st,i){ var idx = STATUS_ORDER.indexOf(t.status === STATUS.PENDING ? STATUS.RUNNING : t.status); return (i>0?'<span class="sep"></span>':'') + '<span class="st '+(i<idx?'done':i===idx?'cur':'')+'"><span class="num">'+(i<idx?'✓':(i===idx&&t.status===STATUS.PENDING?'⏸':(i+1)))+'</span></span>'; }).join('') + '</div>' +
     '<div class="task-actions">' + taskActions(t) + '</div></div>';
 }

 function renderTasks() {
   var u = state.user, mgr = isManager(u); setTitle('Công việc daily', mgr ? 'Quản lý task daily (Không thuộc Project)' : 'Task daily của bạn');
   var f = state.filters;
   var list = state.tasks.filter(function (t) {
     if (t.projectId || t.crewTask) return false; // Không hiển thị task dự án / crew ở mục daily
     if (f.status && t.status !== f.status) return false;
     if (mgr && f.assignee && t.assigneeCode !== f.assignee) return false;
     if (f.q && !(t.title||'').toLowerCase().includes(f.q.toLowerCase()) && !(t.taskCode||'').toLowerCase().includes(f.q.toLowerCase())) return false;
     return true;
   }).sort(function(a,b){ return (PRIORITY_RANK[a.priority]||2)-(PRIORITY_RANK[b.priority]||2) || (b.createdAt||'').localeCompare(a.createdAt||''); });

   var toolbar = '<div class="card" style="padding:16px 24px;margin-bottom:24px"><div class="row row--wrap" style="gap:12px">' +
     '<div class="row" style="gap:6px"><input id="f-q" placeholder="Tìm tên/mã..." value="' + esc(f.q) + '" style="max-width:200px"><button class="btn btn--secondary btn--sm" id="f-search-btn">Tìm</button>' + (f.q?'<button class="icon-btn" id="f-clear-btn">✕</button>':'') + '</div>' +
     '<select id="f-status" style="max-width:140px"><option value="">Mọi trạng thái</option>' + STATUS_ORDER.map(function(s){return '<option value="'+esc(s)+'" '+(f.status===s?'selected':'')+'>'+esc(s)+'</option>';}).join('') + '</select>' +
     (mgr ? '<select id="f-assignee" style="max-width:150px"><option value="">Mọi người</option>' + state.members.filter(function(m){return m.active;}).map(function(m){return '<option value="'+esc(m.code)+'" '+(f.assignee===m.code?'selected':'')+'>'+esc(m.name)+'</option>';}).join('') + '</select>' : '') +
     '<div class="spacer"></div>' + ((mgr || deptScopeOf(u.role) === 'own') ? '<button class="btn btn--primary" data-action="open-create">+ ' + (mgr ? 'Giao task daily' : 'Thêm việc của tôi') + '</button>' : '') + '</div></div>';

   var cards = list.length ? '<div class="task-list">' + list.map(taskCard).join('') + '</div>' : '<div class="card empty"><div class="big">🗂️</div><p>Không có task daily.</p></div>';
   setView(toolbar + cards);

   var apply = function() { f.q = (el('f-q')||{}).value||''; f.status = (el('f-status')||{}).value||''; f.assignee = mgr ? ((el('f-assignee')||{}).value||'') : ''; renderTasks(); };
   ['f-status', 'f-assignee'].forEach(function(id){ var n=el(id); if(n) n.addEventListener('change',apply); });
   var sBtn=el('f-search-btn'); if(sBtn) sBtn.addEventListener('click',apply);
   var cBtn=el('f-clear-btn'); if(cBtn) cBtn.addEventListener('click',function(){f.q='';renderTasks();});
 }

 // ================== PRODUCTION CREW ==================
 function drawCrewChart(crewTasks, crewMembers) {
   if (chartInstances.crewDept) { chartInstances.crewDept.destroy(); chartInstances.crewDept = null; }
   if (chartInstances.crewMember) { chartInstances.crewMember.destroy(); chartInstances.crewMember = null; }
   Chart.defaults.font.family = "'Inter', -apple-system, sans-serif"; Chart.defaults.color = "#86868b";
   var s = computeStats(crewTasks, state.period.type, state.period.anchor);
   var ctx = el('crewTaskChart');
   if (ctx) {
     var done = s.completedInP, rem = Math.max(0, s.totalInP - done);
     chartInstances.crewDept = new Chart(ctx, { type: 'doughnut',
       data: { labels: ['Hoàn thành', 'Chưa xong'], datasets: [{ data: [done, rem], backgroundColor: ['#ff2d55', 'rgba(0,0,0,0.05)'], borderWidth: 0 }] },
       options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { usePointStyle: true } } } } });
   }
   var ctxM = el('crewMemberChart');
   if (ctxM) {
     var colors = ['rgba(255,45,85,0.85)','rgba(23, 71, 157,0.85)','rgba(52,199,89,0.85)','rgba(255,159,10,0.85)','rgba(175,82,222,0.85)','rgba(90,200,250,0.85)'];
     var rows = crewMembers.map(function (m) { return { m: m, s: computeStats(crewTasks.filter(function(t){return t.assigneeCode===m.code;}), state.period.type, state.period.anchor) }; }).sort(function(a,b){return b.s.donePts-a.s.donePts;});
     var labels = [], data = [];
     rows.forEach(function (r) { if (r.s.donePts > 0) { labels.push(r.m.name); data.push(r.s.donePts); } });
     if (data.length) chartInstances.crewMember = new Chart(ctxM, { type: 'pie',
       data: { labels: labels, datasets: [{ data: data, backgroundColor: data.map(function(_,i){return colors[i%colors.length];}), borderWidth: 2, borderColor: '#fff' }] },
       options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { usePointStyle: true } } } } });
     else ctxM.parentElement.innerHTML = '<div class="empty faint" style="padding-top:40px">Chưa có KPI crew.</div>';
   }
 }

 function renderCrew() {
   var u = state.user, crewMgr = canManageCrew(u);
   var tab = state.crewTab || 'dashboard';
   var tabLabels = { dashboard: 'Dashboard', tasks: 'Công việc', members: 'Nhân sự', kpi: 'Thống kê' };
   setTitle('🎬 Production Crew — ' + (tabLabels[tab] || ''), 'Khu vực riêng của đội Production (quay · chụp · dựng đa phương tiện)');
   var crewTasks = state.tasks.filter(function (t) { return t.crewTask; });
   var crewMembers = state.members.filter(function (m) { return isCrewRole(m.role); });

   var body = '';
   if (tab === 'dashboard') {
     var s = computeStats(crewTasks, state.period.type, state.period.anchor);
     var pctStr = s.totalInP > 0 ? Math.round(s.taskCompletionRate) + '%' : '—';
     var cards =
       '<div class="card kpi"><div class="kpi-top"><div class="kpi-icon ico-red"><span class="glyph">🎬</span></div></div><div class="kpi-val">' + s.completedInP + '<span class="faint" style="font-size:1.1rem">/' + s.totalInP + '</span></div><div class="kpi-sub">Task crew HT / Giao</div></div>' +
       '<div class="card kpi"><div class="kpi-top"><div class="kpi-icon ico-green"><span class="glyph">⏱️</span></div></div><div class="kpi-val">' + fmtH(s.avgCycleH) + '</div><div class="kpi-sub">T/g làm TB (Start → Done)</div></div>' +
       '<div class="card kpi"><div class="kpi-top"><div class="kpi-icon ico-blue"><span class="glyph">👥</span></div></div><div class="kpi-val">' + crewMembers.length + '</div><div class="kpi-sub">Thành viên crew</div></div>' +
       '<div class="card kpi"><div class="kpi-top"><div class="kpi-icon ico-purple"><span class="glyph">✨</span></div></div><div class="kpi-val">' + (Math.round(s.donePts*10)/10) + '</div><div class="kpi-sub">Điểm KPI HT (Crew)</div></div>';
     var deptInner = s.totalInP === 0
       ? '<div class="empty"><div class="big">🎬</div><p>Chưa có task crew trong kỳ này.</p></div>'
       : '<div class="chart-container"><canvas id="crewTaskChart"></canvas></div>';
     body = '<div class="row row--wrap" style="margin-bottom:24px">' + periodControl() + '</div>' +
       '<div class="grid-cards" style="margin-bottom:24px">' + cards + '</div>' +
       '<div class="grid-dashboard"><div class="stack"><div class="card stack"><h3>Tỉ lệ hoàn thành task crew (' + pctStr + ')</h3>' + deptInner + '</div></div>' +
       '<div class="stack"><div class="card stack"><h3>Tỉ trọng đóng góp KPI Crew</h3><div class="chart-container"><canvas id="crewMemberChart"></canvas></div></div></div></div>';
   } else if (tab === 'tasks') {
     var list = crewTasks.slice().sort(function(a,b){ return (PRIORITY_RANK[a.priority]||2)-(PRIORITY_RANK[b.priority]||2) || (b.createdAt||'').localeCompare(a.createdAt||''); });
     body = '<div class="row row--between" style="margin-bottom:24px"><div class="faint text-sm">Có ' + crewTasks.length + ' task crew</div>' +
       (crewMgr ? '<button class="btn btn--primary" data-action="open-create-crew">+ Giao task Production Crew</button>' : '') + '</div>' +
       (list.length ? '<div class="task-list">' + list.map(taskCard).join('') + '</div>' : '<div class="card empty"><div class="big">🎬</div><p>Chưa có task crew nào.</p></div>');
   } else if (tab === 'members') {
     var rowsHtml = crewMembers.slice().sort(function(a,b){ return CREW_ROLES.indexOf(a.role)-CREW_ROLES.indexOf(b.role) || a.code.localeCompare(b.code); }).map(function (m) {
       var mt = crewTasks.filter(function(t){return t.assigneeCode===m.code;});
       var dn = mt.filter(function(t){return t.status===STATUS.DONE;}).length;
       var canDel = crewMgr && m.code !== state.user.code && (isCrewAdmin(state.user) || rankOf(m.role) > rankOf(state.user.role));
       return '<tr><td class="mono">' + esc(m.code) + '</td><td><b>' + esc(m.name) + '</b></td>' +
         '<td><span class="role-badge ' + (ROLE_CLASS[m.role]||'') + '">' + esc(ROLE_LABEL[m.role]||m.role) + '</span></td>' +
         '<td>' + esc(m.title||'') + '</td><td class="center">' + mt.length + '</td><td class="center">' + dn + '</td>' +

 function openCrewRole() {

   var pool = state.members.filter(function (m) { return m.active && m.role !== ROLE.HEAD && m.role !== ROLE.DEPUTY; });
   var opts = function (cur) {
     return '<option value="">— Không thuộc crew —</option>' + CREW_ROLE_OPTIONS.map(function (r) {
       return '<option value="' + r[0] + '"' + (cur === r[0] ? ' selected' : '') + '>' + esc(r[1]) + '</option>';

   });
 }

   var saveBtn = el('save-kpi-btn');
   if (saveBtn) saveBtn.addEventListener('click', function () {
     var targets = {}; rows.forEach(function (r) { var i = el('kpi-inp-' + r.m.code); if (i) targets[r.m.code] = i.value; });

 function openModal(html, lg) {
   var ov = document.createElement('div'); ov.className = 'overlay'; ov.id = 'modal-overlay';
   ov.innerHTML = '<div class="modal' + (lg ? ' modal--lg' : '') + '" role="dialog">' + html + '</div>';
   document.body.appendChild(ov); requestAnimationFrame(function () { ov.classList.add('is-open'); });
   ov.addEventListener('click', function (e) { if (e.target === ov) closeModal(); });
 }

 // Đổi ảnh đại diện của CHÍNH MÌNH. Ảnh được nén về tối đa 256px (JPEG ~0.82) ở client để base64 nhỏ.
 var _avatarPending = null; // dataURL đang chờ lưu
 function openAvatarModal() {
   var u = state.user; _avatarPending = null;
   var html = '<div class="modal-head"><h2>🖼️ Thay đổi hình ảnh đại diện</h2><button class="icon-btn" data-action="close-modal">✕</button></div>' +
     '<form id="avatar-form"><div class="modal-body">' +
     '<div class="row" style="gap:18px;align-items:center;flex-wrap:wrap">' +
     '<div id="avatar-preview-wrap">' + avatarHtml(u, 96, null) + '</div>' +
     '<div style="flex:1;min-width:180px">' +
     '<div class="text-sm muted" style="margin-bottom:8px">Chọn ảnh từ thiết bị (JPG/PNG). Ảnh sẽ được thu nhỏ tự động.</div>' +
     '<input id="avatar-file" type="file" accept="image/png,image/jpeg,image/webp">' +
     '</div></div>' +
     '<div id="avatar-msg" class="text-sm" style="margin-top:12px;color:var(--c-danger)"></div>' +
     '</div><div class="modal-foot">' +
     (u.avatar ? '<button type="button" class="btn btn--ghost" id="avatar-remove" style="color:var(--c-danger)">Xoá ảnh hiện tại</button>' : '') +
     '<div class="spacer"></div><button type="button" class="btn btn--ghost" data-action="close-modal">Hủy</button>' +
     '<button type="submit" class="btn btn--primary" id="avatar-go" disabled>Lưu ảnh</button></div></form>';
   openModal(html);

   var fileEl = el('avatar-file'), goEl = el('avatar-go'), msgEl = el('avatar-msg'), prevWrap = el('avatar-preview-wrap');
   fileEl.addEventListener('change', function () {
     msgEl.textContent = '';
     var f = this.files && this.files[0]; if (!f) return;
     if (!/^image\//.test(f.type)) { msgEl.textContent = 'Vui lòng chọn tệp ảnh.'; return; }
     if (f.size > 8 * 1024 * 1024) { msgEl.textContent = 'Ảnh gốc quá lớn (tối đa 8MB).'; return; }
     var reader = new FileReader();
     reader.onload = function (ev) {
       var img = new Image();
       img.onload = function () {
         var max = 256, w = img.width, h = img.height;
         if (w > h) { if (w > max) { h = Math.round(h * max / w); w = max; } }
         else { if (h > max) { w = Math.round(w * max / h); h = max; } }
         var cv = document.createElement('canvas'); cv.width = w; cv.height = h;
         cv.getContext('2d').drawImage(img, 0, 0, w, h);
         var data = cv.toDataURL('image/jpeg', 0.82);
         if (data.length > 200000) data = cv.toDataURL('image/jpeg', 0.6);
         if (data.length > 200000) { msgEl.textContent = 'Ảnh quá lớn sau khi nén. Hãy chọn ảnh khác.'; return; }
         _avatarPending = data;
         prevWrap.innerHTML = avatarHtml({ name: u.name, role: u.role, avatar: data }, 96, null);
         goEl.disabled = false;
       };
       img.onerror = function () { msgEl.textContent = 'Không đọc được ảnh.'; };
       img.src = ev.target.result;
     };
     reader.onerror = function () { msgEl.textContent = 'Không đọc được tệp.'; };
     reader.readAsDataURL(f);
   });

   var rm = el('avatar-remove');
   if (rm) rm.addEventListener('click', function () {
     this.disabled = true; this.innerHTML = '<span class="spin"></span>';
     Server.saveAvatar(state.token, '').then(function (r) { state.user.avatar = ''; return refreshState(); })
       .then(function () { closeModal(); toast('Đã xoá ảnh đại diện.', 'ok'); renderShell(); })
       .catch(function (e) { rm.disabled = false; rm.textContent = 'Xoá ảnh hiện tại'; handleErr(e); });
   });

   $('#avatar-form').addEventListener('submit', function (ev) {
     ev.preventDefault();
     if (!_avatarPending) return;
     var b = el('avatar-go'); b.disabled = true; b.innerHTML = '<span class="spin"></span>';
     Server.saveAvatar(state.token, _avatarPending).then(function (r) { state.user.avatar = r && r.avatar != null ? r.avatar : _avatarPending; return refreshState(); })
       .then(function () { closeModal(); toast('Đã cập nhật ảnh đại diện.', 'ok'); renderShell(); })
       .catch(function (e) { b.disabled = false; b.textContent = 'Lưu ảnh'; handleErr(e); });
   });
 }

 // ================== XUẤT EXCEL (Trưởng/Phó phòng) ==================
 // Xuất 3 sheet: Công việc, Nhân sự, Mục tiêu KPI — chỉ trong phạm vi dữ liệu người dùng được xem.
 function exportToExcel() {
   if (!isManager(state.user)) return; // phòng thủ thêm
   if (typeof XLSX === 'undefined') { toast('Thư viện Excel chưa tải xong, thử lại sau giây lát.', 'err'); return; }
   try {
     var projName = function (id) { if (!id) return ''; var p = (state.projects||[]).filter(function(x){return x.id===id;})[0]; return p ? p.name : id; };
     var taskRows = (state.tasks||[]).map(function (t) {
       return {
         'Mã việc': t.taskCode, 'Tiêu đề': t.title, 'Mô tả': t.description || '',
         'Người nhận': memberName(t.assigneeCode), 'Người giao': memberName(t.createdBy),
         'Loại': t.crewTask ? 'Production Crew' : (t.projectId ? 'Dự án' : 'Daily'),
         'Dự án': projName(t.projectId), 'Độ khó': t.difficulty, 'Điểm KPI': t.kpiPoint,
         'Ưu tiên': t.priority, 'Trạng thái': t.status,
         'Hạn chót': ymd(t.deadline), 'Ngày tạo': ymd(t.createdAt), 'Hoàn thành lúc': ymd(t.completedAt),
         'Ghi chú': t.note || ''
       };
     });
     var memRows = (state.members||[]).map(function (m) {
       return { 'Mã NV': m.code, 'Họ tên': m.name, 'Vai trò': ROLE_LABEL[m.role] || m.role, 'Chức danh': m.title || '', 'Đang hoạt động': m.active ? 'Có' : 'Không' };
     });
     var kpiRows = Object.keys(state.kpiTargets || {}).map(function (c) {
       var m = (state.members||[]).filter(function(x){return x.code===c;})[0];
       return { 'Mã NV': c, 'Họ tên': memberName(c), 'Vai trò': m ? (ROLE_LABEL[m.role]||m.role) : '', 'Mục tiêu (điểm)': state.kpiTargets[c] };
     });
     var wb = XLSX.utils.book_new();
     XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(taskRows.length ? taskRows : [{ 'Mã việc': '(trống)' }]), 'Công việc');
     XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(memRows.length ? memRows : [{ 'Mã NV': '(trống)' }]), 'Nhân sự');
     XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(kpiRows.length ? kpiRows : [{ 'Mã NV': '(trống)' }]), 'Mục tiêu KPI');
     var fname = 'BaoCao_CongViec_' + todayStr() + '.xlsx';
     XLSX.writeFile(wb, fname);
     toast('Đã xuất ' + fname, 'ok');
   } catch (e) { toast('Lỗi xuất Excel: ' + (e.message || e), 'err'); }
 }

 // ================== EVENTS ROUTER ==================
 document.addEventListener('click', function (e) {
   var node = e.target.closest('[data-action]'); var action = node ? node.getAttribute('data-action') : null;
   // Đóng mọi kebab menu khi click ra ngoài (trừ khi đang bấm chính nút mở menu)
   if (action !== 'task-menu' && action !== 'project-menu') {
     Array.prototype.forEach.call(document.querySelectorAll('.kebab-menu.open'), function (m) { m.classList.remove('open'); });
   }
   if (!node) return;
   if (action === 'nav') { e.preventDefault(); state.selectedProjectId = null; state.page = node.getAttribute('data-page'); var _tb = node.getAttribute('data-tab'); if (_tb) state.crewTab = _tb; el('sidebar').classList.remove('is-open'); el('scrim') && el('scrim').classList.remove('is-open'); refreshState().then(renderPage).catch(handleErr); }
   else if (action === 'logout') { 
     Server.logout(state.token).catch(function(){}); 
     clearSession(); renderRoot();
     try { location.reload(); } catch(e){} 
   }
   else if (action === 'toggle-sidebar') { el('sidebar').classList.toggle('is-open'); el('scrim').classList.toggle('is-open'); }
   else if (action === 'period-type') { state.period.type = node.getAttribute('data-type'); state.period.anchor = todayStr(); renderPage(); }
   else if (action === 'period-shift') { state.period.anchor = shiftAnchor(state.period.anchor, state.period.type, +node.getAttribute('data-delta')); renderPage(); }
   else if (action === 'cal-month') { state.period.type = 'month'; state.period.anchor = node.getAttribute('data-ym') + '-01'; renderPage(); }
   else if (action === 'cal-day') { state.period.type = 'week'; state.period.anchor = node.getAttribute('data-ymd'); renderPage(); }
   else if (action === 'scope') { state.scope = node.getAttribute('data-scope'); renderPage(); }
   else if (action === 'task-start') doTransition(node.getAttribute('data-code'), 'start');
   else if (action === 'task-pause') doTransition(node.getAttribute('data-code'), 'pause');
   else if (action === 'task-resume') doTransition(node.getAttribute('data-code'), 'resume');
   else if (action === 'task-submit') doTransition(node.getAttribute('data-code'), 'submit', 'Đã nộp báo cáo qua hệ thống');
   else if (action === 'task-complete') doTransition(node.getAttribute('data-code'), 'complete');
   else if (action === 'task-note') openTaskNote(node.getAttribute('data-code'));
   else if (action === 'open-create') openCreateTask(node.getAttribute('data-proj'));
   else if (action === 'open-create-crew') openCreateTask(null, true);
   else if (action === 'crew-tab') { state.crewTab = node.getAttribute('data-tab'); renderPage(); }
   else if (action === 'open-crew-role') openCrewRole();
   else if (action === 'add-crew-member') openAddCrewMember();
   else if (action === 'open-member') openMember(null);
   else if (action === 'edit-member') openMember(node.getAttribute('data-code'));
   else if (action === 'delete-member') doDeleteMember(node.getAttribute('data-code'));
   else if (action === 'toggle-grant') {
     var gcode = node.getAttribute('data-code'), gkey = node.getAttribute('data-key'), gval = node.checked;
     Server.setGrant(state.token, gcode, gkey, gval).then(refreshState).then(function(){ toast(gval ? 'Đã giao quyền.' : 'Đã thu hồi quyền.', 'ok'); renderPage(); }).catch(function(e){ handleErr(e); renderPage(); });
   }
   else if (action === 'open-avatar') openAvatarModal();
   else if (action === 'close-modal') closeModal();
   else if (action === 'view-project') { state.selectedProjectId = node.getAttribute('data-id'); renderPage(); }
   else if (action === 'open-create-project') openProjectForm(null);
   else if (action === 'task-menu') { e.stopPropagation(); toggleKebab(node); }
   else if (action === 'project-menu') { e.stopPropagation(); toggleKebab(node); }
   else if (action === 'edit-task') { e.stopPropagation(); openEditTask(node.getAttribute('data-code')); }
   else if (action === 'delete-task') { e.stopPropagation(); doDeleteTask(node.getAttribute('data-code')); }
   else if (action === 'edit-project') { e.stopPropagation(); openProjectForm(node.getAttribute('data-id')); }
   else if (action === 'delete-project') { e.stopPropagation(); doDeleteProject(node.getAttribute('data-id')); }
   else if (action === 'complete-project') {
     if(confirm('Bạn có chắc chắn muốn hoàn thành dự án này? Các task chưa xong vẫn sẽ giữ nguyên trạng thái.')){
       Server.completeProject(state.token, node.getAttribute('data-id')).then(refreshState).then(function(){ toast('Đã hoàn thành Dự án!', 'ok'); renderPage(); }).catch(handleErr);
     }
   }
   else if (action === 'export-xlsx') exportToExcel();
 });

 function toggleKebab(btn) {
   var menu = btn.parentElement.querySelector('.kebab-menu'); if (!menu) return;
   var wasOpen = menu.classList.contains('open');
   Array.prototype.forEach.call(document.querySelectorAll('.kebab-menu.open'), function (m) { m.classList.remove('open'); });
   if (!wasOpen) menu.classList.add('open');
 }
 function doDeleteTask(code) {
   var t = state.tasks.filter(function (x) { return x.taskCode === code; })[0];
   if (!confirm('Xoá task "' + (t ? t.title : code) + '"?\nMã: ' + code + '\nHành động KHÔNG thể hoàn tác.')) return;
   Server.deleteTask(state.token, code).then(refreshState).then(function () { toast('Đã xoá task.', 'ok'); renderPage(); }).catch(handleErr);
 }
 function doDeleteProject(id) {
   var p = state.projects.filter(function (x) { return x.id === id; })[0];
   var n = state.tasks.filter(function (t) { return t.projectId === id; }).length;
   if (!confirm('Xoá dự án "' + (p ? p.name : id) + '"?\nSẽ xoá luôn ' + n + ' task thuộc dự án này. KHÔNG thể hoàn tác.')) return;
   Server.deleteProject(state.token, id).then(refreshState).then(function () { state.selectedProjectId = null; state.page = 'projects'; toast('Đã xoá dự án.', 'ok'); renderPage(); }).catch(handleErr);
 }

 function doTransition(code, act, link) {
   Server.transitionTask(state.token, code, act, link||'')
     .then(function(t) { return refreshState().then(() => t); })
     .then(function(t) {
       // Yêu cầu: Thông báo khi hoàn thành task đúng format
       if (act === 'complete') {
         toast('đã hoàn thành task-' + t.title + '-' + t.taskCode, 'ok');
       } else {
         var msg = { start:'Bắt đầu làm việc', pause:'Đã tạm hoãn', resume:'Tiếp tục làm việc', submit:'Đã gửi báo cáo' };
         toast(msg[act] || 'Cập nhật thành công', 'ok');
       }
       renderPage(); 
     }).catch(handleErr);
 }

 function bootThenRender() { Server.bootstrap().then(function(b){state.boot=b;}).catch(function(){}).then(renderRoot); }
 function init() {
   try { var s = JSON.parse(localStorage.getItem(SESS_KEY)); if (s && s.token) { state.token=s.token; state.user=s.user; } } catch(e){}
   if (state.token) { Promise.all([Server.bootstrap().then(function(b){state.boot=b;}).catch(function(){}), refreshState()]).then(function(){ state.scope=isManager(state.user)?'overview':'me'; renderRoot(); }).catch(function(){ clearSession(); bootThenRender(); }); }
   else { bootThenRender(); }
 }
 init();
})();
 </script>
